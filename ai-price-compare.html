</head>
<body>
  <div class="ambient-background" aria-hidden="true">
    <img class="ambient-image" data-src="background.webp" alt="" decoding="async">
    <div class="ambient-overlay"></div>
  </div>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-lockup">
        <span class="brand-mark" aria-hidden="true">AI</span>
        <div class="brand-copy">
          <h1 class="brand">AI 价格比对</h1>
          <span class="brand-subtitle">模型成本 · 清晰决策</span>
        </div>
      </div>
      <span id="recordCount" class="record-count" role="status" aria-live="polite" aria-atomic="true"></span>

      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="searchInput" class="search-input" type="search" autocomplete="off" placeholder="搜索模型、分类、中转站或地址" aria-label="搜索价格记录" aria-controls="categoryList" aria-keyshortcuts="/">
        <button id="clearSearch" class="clear-search" type="button" aria-label="清空搜索" title="清空搜索">×</button>
      </div>

      <div class="toolbar-actions">
        <button id="exportButton" class="btn btn-secondary" type="button" title="导出 JSON 备份"><span class="button-icon" aria-hidden="true">↓</span>导出</button>
        <button id="importButton" class="btn btn-secondary" type="button" title="导入 JSON 备份"><span class="button-icon" aria-hidden="true">↑</span>导入</button>
        <button id="addButton" class="btn btn-primary" type="button"><span class="button-icon" aria-hidden="true">＋</span>添加条目</button>
      </div>
      <input id="fileInput" type="file" accept=".json,application/json" hidden>
    </div>
  </header>

  <main>
    <nav class="category-filter-panel" aria-label="分类筛选">
      <span class="category-filter-label">分类</span>
      <div id="categoryFilters" class="category-filter-list"></div>
    </nav>
    <section id="categoryList" class="category-list" aria-label="价格比较结果"></section>
  </main>

  <div id="entryModalLayer" class="modal-layer" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="entryModalTitle">
      <div class="modal-header">
        <h2 id="entryModalTitle" class="modal-title">添加条目</h2>
        <button id="closeEntryButton" class="modal-close" type="button" aria-label="关闭条目编辑" title="关闭">×</button>
      </div>
      <form id="entryForm" aria-describedby="entryError" novalidate>
        <div class="modal-body">
          <input id="entryId" type="hidden">
          <div class="form-grid">
            <div class="form-group full">
              <label class="form-label" for="modelName">模型名称 <span class="required">*</span></label>
              <input id="modelName" class="form-control" type="text" maxlength="160" placeholder="如 gpt-4o-2024-08-06" autocomplete="off" required>
            </div>

            <div class="form-group full">
              <label class="form-label" for="categorySelect">分类 <span class="required">*</span></label>
              <div class="category-field">
                <select id="categorySelect" class="form-control" required></select>
                <button id="newCategoryButton" class="btn btn-secondary" type="button">＋ 新建分类</button>
              </div>
            </div>

            <div class="form-group full">
              <label class="form-label" for="provider">中转站 <span class="required">*</span></label>
              <input id="provider" class="form-control" type="text" maxlength="160" placeholder="如 云智AI" autocomplete="off" required>
            </div>

            <div class="form-group full">
              <label class="form-label" for="relayAddress">中转站网站地址</label>
              <input id="relayAddress" class="form-control" type="url" maxlength="2048" placeholder="如 https://example.com/register" autocomplete="url">
            </div>

            <div class="form-group full">
              <label class="checkbox-row" for="useMultiplier">
                <input id="useMultiplier" type="checkbox">
                启用最终倍率
              </label>
            </div>

            <div id="multiplierGroup" class="form-group full" hidden>
              <label class="form-label" for="multiplier">最终倍率（已含充值比例） <span class="required">*</span></label>
              <input id="multiplier" class="form-control" type="number" min="0" step="any" inputmode="decimal" placeholder="如 2.0">
            </div>

            <div class="form-group">
              <label id="inputPriceLabel" class="form-label" for="baseInputPrice">输入价格 <span class="required">*</span></label>
              <div class="unit-input">
                <input id="baseInputPrice" class="form-control" type="number" min="0" step="any" inputmode="decimal" placeholder="如 15" required>
                <span class="unit">$/1M tokens</span>
              </div>
            </div>

            <div class="form-group">
              <label id="cachePriceLabel" class="form-label" for="baseCacheInputPrice">缓存输入价格 <span class="required">*</span></label>
              <div class="unit-input">
                <input id="baseCacheInputPrice" class="form-control" type="number" min="0" step="any" inputmode="decimal" placeholder="如 7.5" required>
                <span class="unit">$/1M tokens</span>
              </div>
            </div>

            <div class="form-group full">
              <label id="outputPriceLabel" class="form-label" for="baseOutputPrice">输出价格 <span class="required">*</span></label>
              <div class="unit-input">
                <input id="baseOutputPrice" class="form-control" type="number" min="0" step="any" inputmode="decimal" placeholder="如 60" required>
                <span class="unit">$/1M tokens</span>
              </div>
            </div>
          </div>
          <p id="entryError" class="form-error" role="alert"></p>
        </div>
        <div class="modal-footer">
          <button id="cancelEntryButton" class="btn btn-secondary" type="button">取消</button>
          <button class="btn btn-primary" type="submit">保存</button>
        </div>
      </form>
    </section>
  </div>

  <div id="dialogLayer" class="modal-layer secondary" aria-hidden="true">
    <section class="modal compact" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="modal-header">
        <h2 id="dialogTitle" class="modal-title">确认操作</h2>
        <button id="closeDialogButton" class="modal-close" type="button" aria-label="关闭对话框" title="关闭">×</button>
      </div>
      <div class="modal-body">
        <p id="dialogMessage" class="dialog-message"></p>
        <input id="dialogInput" class="form-control dialog-input" type="text" maxlength="160" autocomplete="off" hidden>
        <p id="dialogError" class="form-error" role="alert"></p>
      </div>
      <div class="modal-footer">
        <button id="dialogCancel" class="btn btn-secondary" type="button">取消</button>
        <button id="dialogConfirm" class="btn btn-primary" type="button">确定</button>
      </div>
    </section>
  </div>

  <div id="toastWrap" class="toast-wrap" aria-live="polite" aria-atomic="true"></div>

  <script>
    'use strict';

    const STORAGE_KEY = 'ai-price-compare-data';
    const LEGACY_PUBLISHED_DATA_KEY = 'ai-price-compare-published-data';
    const LEGACY_PUBLISHED_BASE_KEY = 'ai-price-compare-published-base';
    const INVALID_DATA_BACKUP_KEY = 'ai-price-compare-invalid-backup';
    const STORAGE_ENVELOPE_VERSION = 1;
    const STORAGE_WRITER_ID = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const PUBLISHED_DATA = null; // __PUBLISHED_DATA__
    const PRICE_FORMATTER = new Intl.NumberFormat('zh-CN', {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    });
    const REQUIRED_ENTRY_KEYS = [
      'id', 'modelName', 'category', 'provider', 'useMultiplier', 'multiplier',
      'baseInputPrice', 'baseCacheInputPrice', 'baseOutputPrice', 'createdAt', 'updatedAt'
    ];
    const ENTRY_CONTENT_KEYS = [
      'modelName', 'category', 'provider', 'relayAddress', 'useMultiplier', 'multiplier',
      'baseInputPrice', 'baseCacheInputPrice', 'baseOutputPrice'
    ];

    let entries = [];
    const state = {
      searchTerm: '',
      activeCategory: '',
      sortByCategory: new Map(),
      collapsedCategories: new Set(),
      modalCategories: [],
      entryModalMode: 'add',
      draggedEntryId: null,
      entryModalTrigger: null,
      entryModalFocusLocator: null,
      entryModalBase: null,
      dialogTrigger: null,
      dialogFocusLocator: null,
      storageRevision: 0,
      storageWriterId: '',
      storageTombstones: {},
      publishedId: '',
      publishedBase: []
    };

    const elements = {
      categoryFilters: document.getElementById('categoryFilters'),
      categoryList: document.getElementById('categoryList'),
      recordCount: document.getElementById('recordCount'),
      searchInput: document.getElementById('searchInput'),
      clearSearch: document.getElementById('clearSearch'),
      addButton: document.getElementById('addButton'),
      exportButton: document.getElementById('exportButton'),
      importButton: document.getElementById('importButton'),
      fileInput: document.getElementById('fileInput'),
      entryModalLayer: document.getElementById('entryModalLayer'),
      entryModalTitle: document.getElementById('entryModalTitle'),
      closeEntryButton: document.getElementById('closeEntryButton'),
      entryForm: document.getElementById('entryForm'),
      entryId: document.getElementById('entryId'),
      modelName: document.getElementById('modelName'),
      categorySelect: document.getElementById('categorySelect'),
      newCategoryButton: document.getElementById('newCategoryButton'),
      provider: document.getElementById('provider'),
      relayAddress: document.getElementById('relayAddress'),
      useMultiplier: document.getElementById('useMultiplier'),
      multiplierGroup: document.getElementById('multiplierGroup'),
      multiplier: document.getElementById('multiplier'),
      baseInputPrice: document.getElementById('baseInputPrice'),
      baseCacheInputPrice: document.getElementById('baseCacheInputPrice'),
      baseOutputPrice: document.getElementById('baseOutputPrice'),
      inputPriceLabel: document.getElementById('inputPriceLabel'),
      cachePriceLabel: document.getElementById('cachePriceLabel'),
      outputPriceLabel: document.getElementById('outputPriceLabel'),
      entryError: document.getElementById('entryError'),
      cancelEntryButton: document.getElementById('cancelEntryButton'),
      dialogLayer: document.getElementById('dialogLayer'),
      dialogTitle: document.getElementById('dialogTitle'),
      closeDialogButton: document.getElementById('closeDialogButton'),
      dialogMessage: document.getElementById('dialogMessage'),
      dialogInput: document.getElementById('dialogInput'),
      dialogError: document.getElementById('dialogError'),
      dialogCancel: document.getElementById('dialogCancel'),
      dialogConfirm: document.getElementById('dialogConfirm'),
      toastWrap: document.getElementById('toastWrap')
    };

    const pageRegions = [document.querySelector('.topbar'), document.querySelector('main')];

    function entryValue(entry, key) {
      if (key === 'relayAddress') return entry?.[key] || '';
      return entry?.[key] ?? null;
    }

    function entriesAreEqual(left, right) {
      if (!left || !right) return false;
      return ENTRY_CONTENT_KEYS.every(key => entryValue(left, key) === entryValue(right, key));
    }

    function mergeEntryFields(local, base, remote) {
      const merged = {
        id: local.id,
        createdAt: Math.min(local.createdAt, remote.createdAt),
        updatedAt: Math.max(local.updatedAt, remote.updatedAt)
      };
      ENTRY_CONTENT_KEYS.forEach(key => {
        const baseValue = entryValue(base, key);
        const localValue = entryValue(local, key);
        const remoteValue = entryValue(remote, key);
        const localChanged = localValue !== baseValue;
        const remoteChanged = remoteValue !== baseValue;
        merged[key] = localChanged ? localValue : remoteChanged ? remoteValue : remoteValue;
      });
      if (!merged.useMultiplier) merged.multiplier = null;
      return merged;
    }

    function mergeEntrySets(localEntries, baseEntries, remoteEntries, tombstones = {}) {
      if (!localEntries) return remoteEntries.map(entry => ({ ...entry }));
      const localMap = new Map(localEntries.map(entry => [entry.id, entry]));
      const baseMap = new Map((baseEntries || []).map(entry => [entry.id, entry]));
      const remoteMap = new Map(remoteEntries.map(entry => [entry.id, entry]));
      const orderedIds = [...new Set([
        ...remoteEntries.map(entry => entry.id),
        ...localEntries.map(entry => entry.id)
      ])];

      return orderedIds.flatMap(id => {
        if (tombstones[id]) return [];
        const local = localMap.get(id);
        const base = baseMap.get(id);
        const remote = remoteMap.get(id);
        if (!base) {
          if (!local) return remote ? [{ ...remote }] : [];
          if (!remote) return [{ ...local }];
          return [{ ...(local.updatedAt >= remote.updatedAt ? local : remote) }];
        }
        if (!local) return [];
        if (!remote) return entriesAreEqual(local, base) ? [] : [{ ...local }];
        return [mergeEntryFields(local, base, remote)];
      });
    }

    function backupInvalidStorage(raw, rejectedCount) {
      try { localStorage.setItem(INVALID_DATA_BACKUP_KEY, raw); } catch { /* Best effort only. */ }
      showToast(`发现 ${rejectedCount} 条异常记录，已跳过并尝试备份`, true);
    }

    function backupCorruptStorage(raw) {
      if (!raw) return;
      try { localStorage.setItem(INVALID_DATA_BACKUP_KEY, raw); } catch { /* Best effort only. */ }
    }

    function normalizeStoredEntries(value, raw) {
      if (!Array.isArray(value)) throw new Error('stored entries are not an array');
      const valid = value.filter(isValidEntry);
      if (valid.length !== value.length) backupInvalidStorage(raw, value.length - valid.length);
      return valid.map(entry => ({ ...entry }));
    }

    function parseStorageValue(raw) {
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        return { legacy: true, entries: normalizeStoredEntries(parsed, raw) };
      }
      if (!parsed || parsed.version !== STORAGE_ENVELOPE_VERSION || !Array.isArray(parsed.entries)) {
        throw new Error('unsupported storage envelope');
      }
      const tombstones = parsed.tombstones && typeof parsed.tombstones === 'object'
        ? Object.fromEntries(Object.entries(parsed.tombstones)
            .filter(([id, deletedAt]) => id && Number.isFinite(deletedAt)))
        : {};
      return {
        version: STORAGE_ENVELOPE_VERSION,
        revision: Number.isSafeInteger(parsed.revision) && parsed.revision >= 0 ? parsed.revision : 0,
        writerId: typeof parsed.writerId === 'string' ? parsed.writerId : '',
        entries: normalizeStoredEntries(parsed.entries, raw),
        tombstones,
        publishedId: typeof parsed.publishedId === 'string' ? parsed.publishedId : '',
        publishedBase: Array.isArray(parsed.publishedBase)
          ? parsed.publishedBase.filter(isValidEntry).map(entry => ({ ...entry }))
          : []
      };
    }

    function createStorageEnvelope({ entries: nextEntries, revision, tombstones, publishedId, publishedBase }) {
      return {
        version: STORAGE_ENVELOPE_VERSION,
        revision,
        writerId: STORAGE_WRITER_ID,
        entries: nextEntries.map(entry => ({ ...entry })),
        tombstones: { ...tombstones },
        publishedId,
        publishedBase: publishedBase.map(entry => ({ ...entry }))
      };
    }

    function applyStorageEnvelope(envelope) {
      state.storageRevision = envelope.revision;
      state.storageWriterId = envelope.writerId;
      state.storageTombstones = { ...envelope.tombstones };
      state.publishedId = envelope.publishedId;
      state.publishedBase = envelope.publishedBase.map(entry => ({ ...entry }));
      entries = envelope.entries.map(entry => ({ ...entry }));
    }

    function writeStorageEnvelope(envelope) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(envelope));
      try {
        localStorage.removeItem(LEGACY_PUBLISHED_DATA_KEY);
        localStorage.removeItem(LEGACY_PUBLISHED_BASE_KEY);
      } catch {
        // Legacy cleanup is optional after the envelope is committed.
      }
    }

    function publishedSnapshotId(snapshot) {
      const serializedEntries = JSON.stringify(snapshot.entries);
      let hash = 2166136261;
      for (let index = 0; index < serializedEntries.length; index += 1) {
        hash ^= serializedEntries.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return `${snapshot.version}:${snapshot.exportedAt}:${(hash >>> 0).toString(36)}`;
    }

    function loadEntries() {
      const publishedEntries = isValidImport(PUBLISHED_DATA)
        ? PUBLISHED_DATA.entries.map(entry => ({ ...entry }))
        : [];
      const currentPublishedId = publishedEntries.length > 0 ? publishedSnapshotId(PUBLISHED_DATA) : '';
      let stored = null;
      let rawStorage = null;
      try {
        rawStorage = localStorage.getItem(STORAGE_KEY);
        stored = parseStorageValue(rawStorage);
      } catch (error) {
        backupCorruptStorage(rawStorage);
        const fallback = createStorageEnvelope({
          entries: publishedEntries,
          revision: 1,
          tombstones: {},
          publishedId: currentPublishedId,
          publishedBase: publishedEntries
        });
        try {
          writeStorageEnvelope(fallback);
          showToast('本地数据格式异常，已备份并恢复发布数据', true);
        } catch {
          showToast('本地数据格式异常且存储不可用，当前数据仅在本页保留', true);
        }
        applyStorageEnvelope(fallback);
        return entries;
      }

      if (stored?.legacy) {
        let legacyBase = [];
        let legacyPublishedId = '';
        try {
          const rawBase = localStorage.getItem(LEGACY_PUBLISHED_BASE_KEY);
          if (rawBase) legacyBase = normalizeStoredEntries(JSON.parse(rawBase), rawBase);
          legacyPublishedId = localStorage.getItem(LEGACY_PUBLISHED_DATA_KEY) || '';
        } catch {
          legacyBase = [];
        }
        const alreadyCurrent = legacyPublishedId === currentPublishedId;
        const migratedEntries = publishedEntries.length === 0 || alreadyCurrent
          ? stored.entries
          : mergeEntrySets(stored.entries, legacyBase, publishedEntries);
        stored = createStorageEnvelope({
          entries: migratedEntries,
          revision: 1,
          tombstones: {},
          publishedId: currentPublishedId,
          publishedBase: publishedEntries
        });
      } else if (!stored) {
        stored = createStorageEnvelope({
          entries: publishedEntries,
          revision: 1,
          tombstones: {},
          publishedId: currentPublishedId,
          publishedBase: publishedEntries
        });
      } else if (currentPublishedId && stored.publishedId !== currentPublishedId) {
        const mergedEntries = mergeEntrySets(
          stored.entries,
          stored.publishedBase,
          publishedEntries,
          stored.tombstones
        );
        const localChanged = JSON.stringify(stored.entries) !== JSON.stringify(mergedEntries);
        stored = createStorageEnvelope({
          entries: mergedEntries,
          revision: stored.revision + 1,
          tombstones: stored.tombstones,
          publishedId: currentPublishedId,
          publishedBase: publishedEntries
        });
        if (localChanged) {
          showToast('已合并最新发布价格与本地修改');
        }
      }

      try {
        writeStorageEnvelope(stored);
      } catch (error) {
        showToast('浏览器存储不可用，当前数据仅在本页保留', true);
      }
      applyStorageEnvelope(stored);
      return entries;
    }

    function deriveTombstones(baseEntries, nextEntries, existingTombstones = {}) {
      const tombstones = { ...existingTombstones };
      const nextIds = new Set(nextEntries.map(entry => entry.id));
      baseEntries.forEach(entry => {
        if (!nextIds.has(entry.id)) tombstones[entry.id] = Date.now();
      });
      nextEntries.forEach(entry => { delete tombstones[entry.id]; });
      return tombstones;
    }

    function commitEntries(nextEntries, { replace = false } = {}) {
      try {
        const rawLatest = localStorage.getItem(STORAGE_KEY);
        let latest = null;
        try {
          latest = parseStorageValue(rawLatest);
        } catch {
          backupCorruptStorage(rawLatest);
        }
        const latestEnvelope = latest && !latest.legacy ? latest : null;
        const latestIsNewer = latestEnvelope && (
          latestEnvelope.revision > state.storageRevision
          || (latestEnvelope.revision === state.storageRevision
            && latestEnvelope.writerId !== state.storageWriterId)
        );
        const baseEntries = latestIsNewer ? latestEnvelope.entries : entries;
        let tombstones = replace
          ? deriveTombstones(baseEntries, nextEntries)
          : deriveTombstones(entries, nextEntries, state.storageTombstones);
        if (latestIsNewer && !replace) {
          tombstones = { ...tombstones, ...latestEnvelope.tombstones };
        }
        let committedEntries = nextEntries.map(entry => ({ ...entry }));
        if (latestIsNewer && !replace) {
          committedEntries = mergeEntrySets(
            committedEntries,
            entries,
            latestEnvelope.entries,
            tombstones
          );
        }
        const committedIds = new Set(committedEntries.map(entry => entry.id));
        baseEntries.forEach(entry => {
          if (!committedIds.has(entry.id)) tombstones[entry.id] ||= Date.now();
        });
        const envelope = createStorageEnvelope({
          entries: committedEntries,
          revision: Math.max(state.storageRevision, latestEnvelope?.revision || 0) + 1,
          tombstones,
          publishedId: latestIsNewer ? latestEnvelope.publishedId : state.publishedId,
          publishedBase: latestIsNewer ? latestEnvelope.publishedBase : state.publishedBase
        });
        writeStorageEnvelope(envelope);
        applyStorageEnvelope(envelope);
        return envelope.entries;
      } catch (error) {
        showToast('保存失败：浏览器存储空间不可用', true);
        return null;
      }
    }

    function createEntry(data) {
      const now = Date.now();
      const entry = {
        id: generateId(),
        modelName: data.modelName,
        category: data.category,
        provider: data.provider,
        relayAddress: data.relayAddress,
        useMultiplier: data.useMultiplier,
        multiplier: data.useMultiplier ? data.multiplier : null,
        baseInputPrice: data.baseInputPrice,
        baseCacheInputPrice: data.baseCacheInputPrice,
        baseOutputPrice: data.baseOutputPrice,
        createdAt: now,
        updatedAt: now
      };
      return persistAndRender([...entries, entry]) ? entry : null;
    }

    function updateEntry(id, data) {
      const index = entries.findIndex(entry => entry.id === id);
      if (index === -1) return false;
      const currentEntry = entries[index];
      const baseEntry = state.entryModalBase?.id === id ? state.entryModalBase : currentEntry;
      const editedEntry = {
        ...baseEntry,
        ...data,
        multiplier: data.useMultiplier ? data.multiplier : null,
        updatedAt: Date.now()
      };
      const nextEntries = [...entries];
      nextEntries[index] = entriesAreEqual(currentEntry, baseEntry)
        ? editedEntry
        : mergeEntryFields(editedEntry, baseEntry, currentEntry);
      return persistAndRender(nextEntries);
    }

    function deleteEntry(id) {
      const nextEntries = entries.filter(entry => entry.id !== id);
      if (nextEntries.length === entries.length) return false;
      return persistAndRender(nextEntries);
    }

    function moveEntry(id, targetCategory) {
      const index = entries.findIndex(entry => entry.id === id);
      if (index === -1 || entries[index].category === targetCategory) return false;
      const nextEntries = [...entries];
      nextEntries[index] = {
        ...entries[index],
        category: targetCategory,
        updatedAt: Date.now()
      };
      return persistAndRender(nextEntries);
    }


    function updateEntryMultiplier(id, useMultiplier, multiplier) {
      const index = entries.findIndex(entry => entry.id === id);
      if (index === -1) return false;
      const nextEntries = [...entries];
      nextEntries[index] = {
        ...entries[index],
        useMultiplier,
        multiplier: useMultiplier ? multiplier : null,
        updatedAt: Date.now()
      };
      return persistAndRender(nextEntries);
    }

    function renameCategory(oldName, newName) {
      const now = Date.now();
      let changed = false;
      const nextEntries = entries.map(entry => {
        if (entry.category !== oldName) return entry;
        changed = true;
        return { ...entry, category: newName, updatedAt: now };
      });
      if (!changed) return false;
      if (!commitEntries(nextEntries)) return false;

      if (state.sortByCategory.has(oldName) && !state.sortByCategory.has(newName)) {
        state.sortByCategory.set(newName, state.sortByCategory.get(oldName));
      }
      state.sortByCategory.delete(oldName);
      if (state.collapsedCategories.has(oldName)) {
        state.collapsedCategories.delete(oldName);
        state.collapsedCategories.add(newName);
      }
      if (state.activeCategory === oldName) state.activeCategory = newName;
      render();
      return true;
    }

    function deleteCategory(category) {
      const before = entries.length;
      const nextEntries = entries.filter(entry => entry.category !== category);
      if (nextEntries.length === before || !commitEntries(nextEntries)) return false;
      state.sortByCategory.delete(category);
      state.collapsedCategories.delete(category);
      if (state.activeCategory === category) state.activeCategory = '';
      render();
      return true;
    }

    function persistAndRender(nextEntries) {
      if (!commitEntries(nextEntries)) return false;
      render();
      return true;
    }

    function generateId() {
      return `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function categorySortScore(category) {
      const name = category.toLowerCase();
      const rules = [
        [/^(推荐|精选|首选)/, 0],
        [/gpt|openai|codex/, 10],
        [/claude|fable/, 20],
        [/gemini|gemma/, 30],
        [/deepseek/, 40],
        [/qwen|通义|千问/, 50],
        [/glm|智谱/, 60],
        [/kimi|moonshot/, 70],
        [/doubao|豆包/, 80],
        [/minimax/, 90],
        [/grok/, 100],
        [/llama|meta/, 110],
        [/mistral|mixtral|codestral/, 120],
        [/图像|image|绘图/, 200],
        [/视频|video/, 210],
        [/语音|音频|audio|tts/, 220],
        [/向量|embedding|重排|rerank/, 230]
      ];
      const family = rules.find(([pattern]) => pattern.test(name))?.[1] ?? 900;
      const tier = /高档|稳定/.test(name) ? -0.2 : /低档|便宜/.test(name) ? 0.2 : 0;
      return family + tier;
    }

    function compareCategories(left, right) {
      return categorySortScore(left) - categorySortScore(right)
        || left.localeCompare(right, 'zh-CN', { numeric: true });
    }

    function getCategories(source = entries) {
      return [...new Set(source.map(entry => entry.category))].sort(compareCategories);
    }

    function categoryPresentation(category) {
      const separator = category.search(/\s+(?=由于|因为)/);
      if (separator <= 0) return { label: category, description: '' };
      return {
        label: category.slice(0, separator).trim(),
        description: category.slice(separator).trim()
      };
    }

    function normalizeSearchValue(value) {
      return String(value || '').normalize('NFKC').toLocaleLowerCase('zh-CN');
    }

    function getSearchTerms() {
      return normalizeSearchValue(state.searchTerm).trim().split(/\s+/).filter(Boolean);
    }

    function matchesSearch(entry, terms) {
      if (terms.length === 0) return true;
      const haystack = normalizeSearchValue([
        entry.modelName,
        entry.category,
        entry.provider,
        entry.relayAddress
      ].join(' '));
      return terms.every(term => haystack.includes(term));
    }

    function actualPrice(entry, field) {
      const base = Number(entry[field]);
      return entry.useMultiplier ? base * Number(entry.multiplier) : base;
    }

    function formatPrice(value) {
      if (!Number.isFinite(value)) return '—';
      return PRICE_FORMATTER.format(value);
    }

    function formatMultiplier(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return '';
      return Number.isInteger(number) ? number.toFixed(1) : String(Number(number.toFixed(4)));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function isValidRelayAddress(value) {
      if (value === undefined || value === '') return true;
      if (typeof value !== 'string') return false;
      try {
        const url = new URL(value);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch {
        return false;
      }
    }

    function relayAddressMarkup(entry) {
      const address = typeof entry.relayAddress === 'string' ? entry.relayAddress.trim() : '';
      if (!address || !isValidRelayAddress(address)) return '';
      const escapedAddress = escapeHtml(address);
      const displayAddress = new URL(address).hostname.replace(/^www\./, '');
      return `<a class="relay-address" href="${escapedAddress}" target="_blank" rel="noopener noreferrer" title="打开 ${escapedAddress}">${escapeHtml(displayAddress)} <span aria-hidden="true">↗</span></a>`;
    }

    function encoded(value) {
      return encodeURIComponent(String(value));
    }

    function priceMarkup(entry, field, isBest = false) {
      const note = entry.useMultiplier
        ? `<span class="multiplier-note">(×${escapeHtml(formatMultiplier(entry.multiplier))})</span>`
        : '';
      const badge = isBest ? '<span class="best-price-badge">最低</span>' : '';
      return `<span class="price-value">$${formatPrice(actualPrice(entry, field))}</span>${badge}${note}`;
    }

    function renderCategoryFilters(searchMatches) {
      const categories = getCategories();
      if (state.activeCategory && !categories.includes(state.activeCategory)) state.activeCategory = '';
      const counts = new Map(categories.map(category => [category, 0]));
      searchMatches.forEach(entry => counts.set(entry.category, (counts.get(entry.category) || 0) + 1));
      const filters = [{ category: '', label: '全部', count: searchMatches.length }]
        .concat(categories.map(category => ({
          category,
          label: categoryPresentation(category).label,
          count: counts.get(category)
        })));

      elements.categoryFilters.innerHTML = filters.map(filter => {
        const active = filter.category === state.activeCategory;
        const fullLabel = filter.category || '全部分类';
        const disabled = !active && filter.category && filter.count === 0;
        return `<button class="category-filter-button" type="button" data-category-filter="${encoded(filter.category)}" aria-pressed="${active}" aria-label="${escapeHtml(fullLabel)}，${filter.count} 条" title="${escapeHtml(fullLabel)}"${disabled ? ' disabled' : ''}><span>${escapeHtml(filter.label)}</span><span class="category-filter-count">${filter.count}</span></button>`;
      }).join('');
    }


    function render() {
      const terms = getSearchTerms();
      const searchMatches = entries.filter(entry => matchesSearch(entry, terms));
      const filtered = state.activeCategory
        ? searchMatches.filter(entry => entry.category === state.activeCategory)
        : searchMatches;

      renderCategoryFilters(searchMatches);
      elements.clearSearch.classList.toggle('visible', Boolean(state.searchTerm));
      elements.recordCount.textContent = terms.length > 0 || state.activeCategory
        ? `${filtered.length} / ${entries.length} 条`
        : `${entries.length} 条 · ${getCategories().length} 类`;

      if (entries.length === 0) {
        elements.categoryList.innerHTML = `
          <div class="empty-state">
            <strong>还没有价格数据</strong>
            点击右上角「添加条目」开始录入。
          </div>`;
        return;
      }

      if (filtered.length === 0) {
        elements.categoryList.innerHTML = `
          <div class="empty-state">
            <strong>没有匹配结果</strong>
            换个模型名称或中转站关键词试试。
          </div>`;
        return;
      }

      const grouped = new Map();
      filtered.forEach(entry => {
        if (!grouped.has(entry.category)) grouped.set(entry.category, []);
        grouped.get(entry.category).push(entry);
      });

      elements.categoryList.innerHTML = [...grouped.keys()]
        .sort(compareCategories)
        .map(category => renderCategory(category, grouped.get(category)))
        .join('');
    }

    function renderCategory(category, categoryEntries) {
      const sortKey = state.sortByCategory.get(category) || 'baseOutputPrice:asc';
      const [sortField, sortDirection = 'asc'] = sortKey.split(':');
      const sortedEntries = [...categoryEntries].sort((a, b) => {
        if (sortField === 'provider' || sortField === 'modelName') {
          const field = sortField === 'provider' ? 'provider' : 'modelName';
          const difference = a[field].localeCompare(b[field], 'zh-CN', { numeric: true });
          return (sortDirection === 'desc' ? -difference : difference)
            || a.modelName.localeCompare(b.modelName, 'zh-CN', { numeric: true });
        }
        const difference = actualPrice(a, sortField) - actualPrice(b, sortField);
        return (sortDirection === 'desc' ? -difference : difference)
          || a.modelName.localeCompare(b.modelName, 'zh-CN', { numeric: true });
      });
      const collapsed = state.collapsedCategories.has(category);
      const categoryKey = encoded(category);
      const titleId = `category-${categoryKey}`;
      const presentation = categoryPresentation(category);

      return `
        <article class="category-card${collapsed ? ' collapsed' : ''}" data-category="${categoryKey}">
          <header class="category-header">
            <button class="category-toggle" type="button" data-action="toggle-category" data-category="${categoryKey}" aria-expanded="${!collapsed}">
              <span class="chevron" aria-hidden="true">${collapsed ? '▶' : '▼'}</span>
              <span class="category-heading-copy">
                <span id="${titleId}" class="category-title" title="${escapeHtml(category)}">${escapeHtml(presentation.label)}</span>
                ${presentation.description ? `<span class="category-description">${escapeHtml(presentation.description)}</span>` : ''}
              </span>
              <span class="category-count" aria-label="${categoryEntries.length} 条">${categoryEntries.length}</span>
            </button>
            <div class="category-actions">
              <select class="sort-select" data-action="sort-category" data-category="${categoryKey}" aria-label="${escapeHtml(category)}排序方式">
                <option value="baseOutputPrice:asc"${sortKey === 'baseOutputPrice:asc' ? ' selected' : ''}>输出价：低到高</option>
                <option value="baseInputPrice:asc"${sortKey === 'baseInputPrice:asc' ? ' selected' : ''}>输入价：低到高</option>
                <option value="baseCacheInputPrice:asc"${sortKey === 'baseCacheInputPrice:asc' ? ' selected' : ''}>缓存价：低到高</option>
                <option value="baseOutputPrice:desc"${sortKey === 'baseOutputPrice:desc' ? ' selected' : ''}>输出价：高到低</option>
                <option value="provider:asc"${sortKey === 'provider:asc' ? ' selected' : ''}>中转站名称</option>
              </select>
              <button class="btn btn-secondary btn-small" type="button" data-action="edit-category" data-category="${categoryKey}" aria-label="编辑分类 ${escapeHtml(category)}" title="编辑分类"><span aria-hidden="true">✎</span><span class="category-action-label">编辑</span></button>
              <button class="btn btn-ghost-danger btn-small" type="button" data-action="delete-category" data-category="${categoryKey}" aria-label="删除分类 ${escapeHtml(category)}" title="删除分类"><span aria-hidden="true">×</span><span class="category-action-label">删除</span></button>
            </div>
          </header>
          ${collapsed ? '' : renderTable(sortedEntries, titleId, presentation.label)}
        </article>`;
    }

    function renderTable(categoryEntries, titleId, categoryLabel) {
      const priceFields = ['baseInputPrice', 'baseCacheInputPrice', 'baseOutputPrice'];
      const minimums = new Map(priceFields.map(field => [
        field,
        Math.min(...categoryEntries.map(entry => actualPrice(entry, field)))
      ]));
      const hasComparison = categoryEntries.length > 1;
      const rows = categoryEntries.map(entry => {
        const entryId = encoded(entry.id);
        const entryLabel = `${entry.modelName} / ${entry.provider}`;
        const isBest = field => hasComparison && actualPrice(entry, field) === minimums.get(field);
        return `
          <tr data-entry-id="${entryId}">
            <th class="model-cell" scope="row" data-label="模型名称">
              <div class="model-content">
                <span class="drag-handle" draggable="true" data-drag-entry="${entryId}" title="拖动到其他分类；键盘操作可使用编辑" aria-hidden="true">⠿</span>
                <span>${escapeHtml(entry.modelName)}</span>
              </div>
            </th>
            <td class="provider-cell" data-label="中转站">
              <div class="provider-content">
                <span class="provider-name">${escapeHtml(entry.provider)}</span>
                ${relayAddressMarkup(entry)}
              </div>
            </td>
            <td class="multiplier-cell" data-label="最终倍率">
              <div class="inline-multiplier-editor" data-inline-multiplier-editor data-id="${entryId}" data-original-enabled="${entry.useMultiplier}" data-original-multiplier="${entry.useMultiplier ? escapeHtml(entry.multiplier) : ''}">
                <label class="inline-multiplier-toggle" title="是否对本条记录启用最终倍率">
                  <input type="checkbox" data-inline-multiplier-enabled aria-label="${escapeHtml(entryLabel)} 启用最终倍率"${entry.useMultiplier ? ' checked' : ''}>
                  <span>启用</span>
                </label>
                <div class="inline-multiplier-input-wrap">
                  <span class="inline-multiplier-prefix">×</span>
                  <input class="inline-multiplier-input" data-inline-multiplier-input type="number" min="0" step="any" inputmode="decimal" value="${entry.useMultiplier ? escapeHtml(entry.multiplier) : ''}" placeholder="最终倍率" aria-label="${escapeHtml(entryLabel)} 最终倍率"${entry.useMultiplier ? '' : ' disabled'}>
                </div>
                <button class="btn btn-primary btn-small save-multiplier-button" type="button" data-action="save-entry-multiplier" data-id="${entryId}" title="倍率未修改" disabled>保存</button>
              </div>
            </td>
            <td class="price-cell price-input${isBest('baseInputPrice') ? ' is-best' : ''}" data-label="输入价">${priceMarkup(entry, 'baseInputPrice', isBest('baseInputPrice'))}</td>
            <td class="price-cell price-cache cache-column${isBest('baseCacheInputPrice') ? ' is-best' : ''}" data-label="缓存价">${priceMarkup(entry, 'baseCacheInputPrice', isBest('baseCacheInputPrice'))}</td>
            <td class="price-cell price-output${isBest('baseOutputPrice') ? ' is-best' : ''}" data-label="输出价">${priceMarkup(entry, 'baseOutputPrice', isBest('baseOutputPrice'))}</td>
            <td class="action-cell" data-label="操作">
              <div class="row-actions">
                <button class="btn btn-secondary btn-small" type="button" data-action="copy-entry" data-id="${entryId}" aria-label="复制 ${escapeHtml(entryLabel)}">复制</button>
                <button class="btn btn-secondary btn-small" type="button" data-action="edit-entry" data-id="${entryId}" aria-label="编辑 ${escapeHtml(entryLabel)}">编辑</button>
                <button class="btn btn-ghost-danger btn-small" type="button" data-action="delete-entry" data-id="${entryId}" aria-label="删除 ${escapeHtml(entryLabel)}">删除</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      return `
        <div class="table-wrap">
          <table aria-labelledby="${titleId}">
            <caption class="sr-only">${escapeHtml(categoryLabel)}价格列表</caption>
            <thead>
              <tr>
                <th class="model-cell" scope="col">模型名称</th>
                <th class="provider-cell" scope="col">中转站</th>
                <th class="multiplier-cell" scope="col">最终倍率（已含充值比例）</th>
                <th class="price-cell" scope="col">输入价（$/1M tokens）</th>
                <th class="price-cell cache-column" scope="col">缓存输入价（$/1M tokens）</th>
                <th class="price-cell" scope="col">输出价（$/1M tokens）</th>
                <th class="action-cell" scope="col">操作</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function setPageInert(isInert) {
      pageRegions.forEach(region => { if (region) region.inert = isInert; });
    }

    function getFocusableElements(layer) {
      return [...layer.querySelectorAll(
        'button:not([disabled]), input:not([disabled]):not([type="hidden"]), select:not([disabled]), textarea:not([disabled]), a[href], [tabindex]:not([tabindex="-1"])'
      )].filter(element => !element.hidden && element.getClientRects().length > 0);
    }

    function trapFocus(event, layer) {
      const focusable = getFocusableElements(layer);
      if (focusable.length === 0) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    function createFocusLocator(element) {
      if (!(element instanceof HTMLElement)) return null;
      if (element.id) return { id: element.id };
      if (!element.dataset.action) return null;
      return {
        action: element.dataset.action,
        entryId: element.dataset.id || '',
        category: element.dataset.category || ''
      };
    }

    function findFocusLocator(locator) {
      if (!locator) return null;
      if (locator.id) return document.getElementById(locator.id);
      return [...document.querySelectorAll('[data-action]')].find(element =>
        element.dataset.action === locator.action
        && (element.dataset.id || '') === locator.entryId
        && (element.dataset.category || '') === locator.category) || null;
    }

    function restoreFocus(element, locator = null) {
      const target = element instanceof HTMLElement && element.isConnected
        ? element
        : findFocusLocator(locator);
      if (target && !target.closest('[inert]')) target.focus();
    }

    function openEntryModal(entry = null, mode = entry ? 'edit' : 'add', trigger = document.activeElement) {
      elements.entryForm.reset();
      clearEntryError();
      state.entryModalTrigger = trigger;
      state.entryModalFocusLocator = createFocusLocator(trigger);
      state.entryModalMode = mode;
      state.entryModalBase = mode === 'edit' && entry ? { ...entry } : null;
      state.modalCategories = getCategories();

      if (entry && !state.modalCategories.includes(entry.category)) {
        state.modalCategories.push(entry.category);
        state.modalCategories.sort((a, b) => a.localeCompare(b, 'zh-CN'));
      }

      elements.entryModalTitle.textContent = mode === 'copy' ? '复制条目' : entry ? '编辑条目' : '添加条目';
      elements.entryId.value = mode === 'edit' && entry ? entry.id : '';
      populateCategorySelect(entry ? entry.category : state.modalCategories[0] || '');

      if (entry) {
        elements.modelName.value = entry.modelName;
        elements.provider.value = entry.provider;
        elements.relayAddress.value = entry.relayAddress || '';
        elements.useMultiplier.checked = entry.useMultiplier;
        elements.multiplier.value = entry.useMultiplier ? entry.multiplier : '';
        elements.baseInputPrice.value = entry.baseInputPrice;
        elements.baseCacheInputPrice.value = entry.baseCacheInputPrice;
        elements.baseOutputPrice.value = entry.baseOutputPrice;
      }

      updateMultiplierUI();
      elements.entryModalLayer.classList.add('open');
      elements.entryModalLayer.setAttribute('aria-hidden', 'false');
      setPageInert(true);
      document.body.style.overflow = 'hidden';
      setTimeout(() => elements.modelName.focus(), 0);
    }

    function closeEntryModal() {
      if (!elements.entryModalLayer.classList.contains('open')) return;
      elements.entryModalLayer.classList.remove('open');
      elements.entryModalLayer.setAttribute('aria-hidden', 'true');
      if (!elements.dialogLayer.classList.contains('open')) {
        setPageInert(false);
        document.body.style.overflow = '';
        restoreFocus(state.entryModalTrigger, state.entryModalFocusLocator);
      }
      clearEntryError();
      elements.entryId.value = '';
      state.entryModalMode = 'add';
      state.entryModalTrigger = null;
      state.entryModalFocusLocator = null;
      state.entryModalBase = null;
    }

    function populateCategorySelect(selectedCategory = '') {
      if (state.modalCategories.length === 0) {
        elements.categorySelect.innerHTML = '<option value="">请先新建分类</option>';
        elements.categorySelect.value = '';
        return;
      }

      elements.categorySelect.innerHTML = state.modalCategories
        .map(category => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`)
        .join('');
      elements.categorySelect.value = state.modalCategories.includes(selectedCategory)
        ? selectedCategory
        : state.modalCategories[0];
    }

    function updateMultiplierUI() {
      const enabled = elements.useMultiplier.checked;
      elements.multiplierGroup.hidden = !enabled;
      elements.inputPriceLabel.innerHTML = `${enabled ? '基础输入价格' : '输入价格'} <span class="required">*</span>`;
      elements.cachePriceLabel.innerHTML = `${enabled ? '基础缓存输入价格' : '缓存输入价格'} <span class="required">*</span>`;
      elements.outputPriceLabel.innerHTML = `${enabled ? '基础输出价格' : '输出价格'} <span class="required">*</span>`;
      elements.multiplier.required = enabled;
      if (!enabled) elements.multiplier.value = '';
    }

    function setEntryError(message, field = null) {
      elements.entryError.textContent = message;
      elements.entryError.classList.add('visible');
      if (field) {
        field.setAttribute('aria-invalid', 'true');
        field.focus();
      }
    }

    function clearEntryError() {
      elements.entryError.textContent = '';
      elements.entryError.classList.remove('visible');
      elements.entryForm.querySelectorAll('[aria-invalid="true"]').forEach(field => field.removeAttribute('aria-invalid'));
    }

    function readEntryForm() {
      clearEntryError();
      const modelName = elements.modelName.value.trim();
      const category = elements.categorySelect.value.trim();
      const provider = elements.provider.value.trim();
      const relayAddress = elements.relayAddress.value.trim();
      const useMultiplier = elements.useMultiplier.checked;
      const rawMultiplier = elements.multiplier.value.trim();
      const rawInput = elements.baseInputPrice.value.trim();
      const rawCache = elements.baseCacheInputPrice.value.trim();
      const rawOutput = elements.baseOutputPrice.value.trim();

      if (!modelName) { setEntryError('请填写模型名称', elements.modelName); return null; }
      if (!category) { setEntryError('请选择或新建分类', elements.categorySelect); return null; }
      if (!provider) { setEntryError('请填写中转站名称', elements.provider); return null; }
      if (useMultiplier && !rawMultiplier) { setEntryError('请填写最终倍率', elements.multiplier); return null; }
      if (!rawInput) { setEntryError('请填写输入价格', elements.baseInputPrice); return null; }
      if (!rawCache) { setEntryError('请填写缓存输入价格', elements.baseCacheInputPrice); return null; }
      if (!rawOutput) { setEntryError('请填写输出价格', elements.baseOutputPrice); return null; }
      if (!isValidRelayAddress(relayAddress)) {
        setEntryError('中转站网站地址必须是有效的 HTTP 或 HTTPS 地址', elements.relayAddress);
        return null;
      }

      const multiplier = useMultiplier ? parseFloat(rawMultiplier) : null;
      const baseInputPrice = parseFloat(rawInput);
      const baseCacheInputPrice = parseFloat(rawCache);
      const baseOutputPrice = parseFloat(rawOutput);
      const numericValues = [baseInputPrice, baseCacheInputPrice, baseOutputPrice];
      if (useMultiplier) numericValues.push(multiplier);

      if (numericValues.some(value => !Number.isFinite(value))) {
        const invalidField = [
          ...(useMultiplier ? [[elements.multiplier, multiplier]] : []),
          [elements.baseInputPrice, baseInputPrice],
          [elements.baseCacheInputPrice, baseCacheInputPrice],
          [elements.baseOutputPrice, baseOutputPrice]
        ].find(([, value]) => !Number.isFinite(value))?.[0];
        setEntryError('价格和最终倍率必须填写有效数字', invalidField);
        return null;
      }
      if (baseInputPrice < 0 || baseCacheInputPrice < 0 || baseOutputPrice < 0) {
        const invalidField = [
          [elements.baseInputPrice, baseInputPrice],
          [elements.baseCacheInputPrice, baseCacheInputPrice],
          [elements.baseOutputPrice, baseOutputPrice]
        ].find(([, value]) => value < 0)?.[0];
        setEntryError('价格不能小于 0', invalidField);
        return null;
      }
      if (useMultiplier && multiplier <= 0) {
        setEntryError('最终倍率必须大于 0', elements.multiplier);
        return null;
      }

      return {
        modelName,
        category,
        provider,
        relayAddress,
        useMultiplier,
        multiplier,
        baseInputPrice,
        baseCacheInputPrice,
        baseOutputPrice
      };
    }

    function isValidEntry(entry) {
      if (!entry || typeof entry !== 'object' || Array.isArray(entry)) return false;
      if (!REQUIRED_ENTRY_KEYS.every(key => Object.prototype.hasOwnProperty.call(entry, key))) return false;
      if (typeof entry.id !== 'string' || entry.id.trim() === '') return false;
      if (typeof entry.modelName !== 'string' || entry.modelName.trim() === '') return false;
      if (typeof entry.category !== 'string' || entry.category.trim() === '') return false;
      if (typeof entry.provider !== 'string' || entry.provider.trim() === '') return false;
      if (!isValidRelayAddress(entry.relayAddress)) return false;
      if (typeof entry.useMultiplier !== 'boolean') return false;
      if (entry.useMultiplier) {
        if (typeof entry.multiplier !== 'number' || !Number.isFinite(entry.multiplier) || entry.multiplier <= 0) return false;
      } else if (entry.multiplier !== null) {
        return false;
      }
      if (![entry.baseInputPrice, entry.baseCacheInputPrice, entry.baseOutputPrice]
        .every(value => typeof value === 'number' && Number.isFinite(value) && value >= 0)) return false;
      if (typeof entry.createdAt !== 'number' || !Number.isFinite(entry.createdAt)) return false;
      if (typeof entry.updatedAt !== 'number' || !Number.isFinite(entry.updatedAt)) return false;
      return true;
    }

    function isValidImport(data) {
      if (!data || typeof data !== 'object' || Array.isArray(data)) return false;
      if (![1, 2].includes(data.version) || typeof data.exportedAt !== 'string' || Number.isNaN(Date.parse(data.exportedAt))) return false;
      if (!Array.isArray(data.entries) || !data.entries.every(isValidEntry)) return false;
      const ids = data.entries.map(entry => entry.id);
      return new Set(ids).size === ids.length;
    }

    function exportData() {
      const payload = {
        exportedAt: new Date().toISOString(),
        version: 2,
        entries
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const date = new Date();
      const localDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      link.href = url;
      link.download = `ai-price-data-${localDate}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
      showToast(`已导出 ${entries.length} 条记录`);
    }

    async function importFile(file) {
      try {
        const content = await file.text();
        const data = JSON.parse(content);
        if (!isValidImport(data)) throw new Error('invalid format');

        const confirmed = await showConfirm({
          title: '确认导入',
          message: `导入将覆盖当前全部 ${entries.length} 条数据，确认继续？`,
          confirmText: '确认导入',
          danger: true
        });
        if (!confirmed) return;

        const nextEntries = data.entries.map(entry => ({ ...entry }));
        if (!commitEntries(nextEntries, { replace: true })) return;
        state.activeCategory = '';
        state.sortByCategory.clear();
        state.collapsedCategories.clear();
        render();
        showToast(`导入成功，共 ${entries.length} 条记录`);
      } catch (error) {
        showAlert('导入失败', '文件格式不符，请选择正确的导出文件');
      } finally {
        elements.fileInput.value = '';
      }
    }

    let activeDialogResolver = null;
    let activeDialogMode = 'confirm';
    let activeDialogValidator = null;

    function openDialog(options) {
      if (activeDialogResolver) activeDialogResolver(false);
      state.dialogTrigger = document.activeElement;
      state.dialogFocusLocator = createFocusLocator(document.activeElement);
      activeDialogMode = options.mode || 'confirm';
      activeDialogValidator = options.validator || null;
      elements.dialogTitle.textContent = options.title || '确认操作';
      elements.dialogMessage.textContent = options.message || '';
      elements.dialogConfirm.textContent = options.confirmText || '确定';
      elements.dialogCancel.textContent = options.cancelText || '取消';
      elements.dialogCancel.hidden = activeDialogMode === 'alert';
      elements.dialogConfirm.className = `btn ${options.danger ? 'btn-danger' : 'btn-primary'}`;
      elements.dialogInput.hidden = activeDialogMode !== 'input';
      elements.dialogInput.value = options.defaultValue || '';
      elements.dialogInput.placeholder = options.placeholder || '';
      elements.dialogError.textContent = '';
      elements.dialogError.classList.remove('visible');
      elements.dialogLayer.classList.add('open');
      elements.dialogLayer.setAttribute('aria-hidden', 'false');
      if (elements.entryModalLayer.classList.contains('open')) {
        elements.entryModalLayer.inert = true;
      } else {
        setPageInert(true);
      }
      document.body.style.overflow = 'hidden';

      return new Promise(resolve => {
        activeDialogResolver = resolve;
        setTimeout(() => {
          if (activeDialogMode === 'input') {
            elements.dialogInput.focus();
            elements.dialogInput.select();
          } else {
            elements.dialogConfirm.focus();
          }
        }, 0);
      });
    }

    function closeDialog(result) {
      const resolver = activeDialogResolver;
      activeDialogResolver = null;
      activeDialogValidator = null;
      elements.dialogLayer.classList.remove('open');
      elements.dialogLayer.setAttribute('aria-hidden', 'true');
      if (elements.entryModalLayer.classList.contains('open')) {
        elements.entryModalLayer.inert = false;
      } else {
        setPageInert(false);
        document.body.style.overflow = '';
      }
      restoreFocus(state.dialogTrigger, state.dialogFocusLocator);
      state.dialogTrigger = null;
      state.dialogFocusLocator = null;
      if (resolver) resolver(result);
    }

    function showConfirm(options) {
      return openDialog({ ...options, mode: 'confirm' });
    }

    function showAlert(title, message) {
      return openDialog({ title, message, mode: 'alert', confirmText: '知道了' });
    }

    function showInput(options) {
      return openDialog({ ...options, mode: 'input' });
    }

    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast${isError ? ' error' : ''}`;
      toast.setAttribute('role', isError ? 'alert' : 'status');
      toast.textContent = message;
      elements.toastWrap.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }

    function focusCategoryControl(category) {
      requestAnimationFrame(() => {
        const categoryKey = encoded(category);
        const toggle = [...elements.categoryList.querySelectorAll('[data-action="toggle-category"]')]
          .find(element => element.dataset.category === categoryKey);
        (toggle || elements.addButton).focus();
      });
    }

    let scheduledRender = 0;
    function scheduleRender() {
      if (scheduledRender) cancelAnimationFrame(scheduledRender);
      scheduledRender = requestAnimationFrame(() => {
        scheduledRender = 0;
        render();
      });
    }

    function updateMultiplierEditorState(editor) {
      if (!editor) return;
      const enabled = editor.querySelector('[data-inline-multiplier-enabled]').checked;
      const input = editor.querySelector('[data-inline-multiplier-input]');
      const button = editor.querySelector('[data-action="save-entry-multiplier"]');
      const originalEnabled = editor.dataset.originalEnabled === 'true';
      const originalMultiplier = Number(editor.dataset.originalMultiplier);
      const currentMultiplier = Number(input.value);
      const changed = enabled !== originalEnabled
        || (enabled && (!input.value.trim() || currentMultiplier !== originalMultiplier));
      button.disabled = !changed;
      button.title = changed ? '保存倍率修改' : '倍率未修改';
    }

    elements.searchInput.addEventListener('input', event => {
      state.searchTerm = event.target.value;
      scheduleRender();
    });

    elements.clearSearch.addEventListener('click', () => {
      state.searchTerm = '';
      elements.searchInput.value = '';
      elements.searchInput.focus();
      render();
    });

    elements.categoryFilters.addEventListener('click', event => {
      const button = event.target.closest('[data-category-filter]');
      if (!button) return;
      state.activeCategory = decodeURIComponent(button.dataset.categoryFilter);
      render();
    });

    elements.addButton.addEventListener('click', event => openEntryModal(null, 'add', event.currentTarget));
    elements.cancelEntryButton.addEventListener('click', closeEntryModal);
    elements.closeEntryButton.addEventListener('click', closeEntryModal);
    elements.useMultiplier.addEventListener('change', updateMultiplierUI);

    elements.entryModalLayer.addEventListener('click', event => {
      if (event.target === elements.entryModalLayer) closeEntryModal();
    });

    elements.newCategoryButton.addEventListener('click', async () => {
      const category = await showInput({
        title: '新建分类',
        message: '输入新的分类名称：',
        placeholder: '如 GPT-4o 系列',
        confirmText: '创建',
        validator(value) {
          const trimmed = value.trim();
          if (!trimmed) return '分类名称不能为空';
          if (state.modalCategories.includes(trimmed)) return '该分类已存在';
          return '';
        }
      });
      if (typeof category !== 'string') return;
      const trimmed = category.trim();
      state.modalCategories.push(trimmed);
      state.modalCategories.sort((a, b) => a.localeCompare(b, 'zh-CN'));
      populateCategorySelect(trimmed);
    });

    elements.entryForm.addEventListener('submit', event => {
      event.preventDefault();
      const data = readEntryForm();
      if (!data) return;

      const id = elements.entryId.value;
      const mode = state.entryModalMode;
      let saved = false;
      if (id) {
        if (!entries.some(entry => entry.id === id)) {
          setEntryError('这条记录已在另一个标签页中删除，无法继续保存');
          return;
        }
        saved = updateEntry(id, data);
      } else {
        saved = Boolean(createEntry(data));
      }
      if (!saved) return;
      closeEntryModal();
      showToast(id ? '条目已更新' : mode === 'copy' ? '条目副本已添加' : '条目已添加');
    });

    elements.categoryList.addEventListener('click', async event => {
      const target = event.target.closest('[data-action]');
      if (!target || target.tagName === 'SELECT') return;
      const action = target.dataset.action;

      if (action === 'toggle-category') {
        const category = decodeURIComponent(target.dataset.category);
        if (state.collapsedCategories.has(category)) state.collapsedCategories.delete(category);
        else state.collapsedCategories.add(category);
        render();
        focusCategoryControl(category);
        return;
      }


      if (action === 'save-entry-multiplier') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        const editor = target.closest('[data-inline-multiplier-editor]');
        if (!entry || !editor) return;

        const enabled = editor.querySelector('[data-inline-multiplier-enabled]').checked;
        const input = editor.querySelector('[data-inline-multiplier-input]');
        input.classList.remove('invalid');
        let multiplier = null;
        if (enabled) {
          const rawValue = input.value.trim();
          multiplier = parseFloat(rawValue);
          if (!rawValue || !Number.isFinite(multiplier) || multiplier <= 0) {
            input.classList.add('invalid');
            input.focus();
            showToast('请输入大于 0 的有效最终倍率', true);
            return;
          }
        }

        if (updateEntryMultiplier(id, enabled, multiplier)) {
          showToast(enabled
            ? `已将「${entry.modelName}」最终倍率改为 ×${formatMultiplier(multiplier)}`
            : `已关闭「${entry.modelName}」的最终倍率`);
          requestAnimationFrame(() => {
            const editor = [...elements.categoryList.querySelectorAll('[data-inline-multiplier-editor]')]
              .find(element => element.dataset.id === encoded(id));
            editor?.querySelector('[data-inline-multiplier-input]')?.focus();
          });
        }
        return;
      }

      if (action === 'copy-entry') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        if (entry) openEntryModal(entry, 'copy', target);
        return;
      }

      if (action === 'edit-entry') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        if (entry) openEntryModal(entry, 'edit', target);
        return;
      }

      if (action === 'delete-entry') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        if (!entry) return;
        const confirmed = await showConfirm({
          title: '删除记录',
          message: `确定删除「${entry.modelName} / ${entry.provider}」这条记录？`,
          confirmText: '删除',
          danger: true
        });
        if (confirmed && deleteEntry(id)) {
          showToast('记录已删除');
          focusCategoryControl(entry.category);
        }
        return;
      }

      if (action === 'edit-category') {
        const category = decodeURIComponent(target.dataset.category);
        const newName = await showInput({
          title: '编辑分类',
          message: '修改分类名称。若名称与现有分类相同，两者会合并。',
          defaultValue: category,
          confirmText: '保存',
          validator(value) {
            return value.trim() ? '' : '分类名称不能为空';
          }
        });
        if (typeof newName !== 'string') return;
        const trimmed = newName.trim();
        if (trimmed !== category && renameCategory(category, trimmed)) {
          showToast('分类名称已更新');
          focusCategoryControl(trimmed);
        }
        return;
      }

      if (action === 'delete-category') {
        const category = decodeURIComponent(target.dataset.category);
        const count = entries.filter(entry => entry.category === category).length;
        const confirmed = await showConfirm({
          title: '删除分类',
          message: `确定删除「${category}」分类？\n${count} 个条目将被一并删除。`,
          confirmText: '删除分类',
          danger: true
        });
        if (confirmed && deleteCategory(category)) {
          showToast(`分类及 ${count} 个条目已删除`);
          requestAnimationFrame(() => elements.categoryFilters.querySelector('[data-category-filter=""]')?.focus());
        }
      }
    });


    elements.categoryList.addEventListener('change', event => {
      const multiplierToggle = event.target.closest('[data-inline-multiplier-enabled]');
      if (multiplierToggle) {
        const editor = multiplierToggle.closest('[data-inline-multiplier-editor]');
        const input = editor.querySelector('[data-inline-multiplier-input]');
        input.disabled = !multiplierToggle.checked;
        input.classList.remove('invalid');
        if (multiplierToggle.checked) {
          if (!input.value.trim()) input.value = '1';
          input.focus();
          input.select();
        }
        updateMultiplierEditorState(editor);
        return;
      }

      const target = event.target.closest('[data-action="sort-category"]');
      if (!target) return;
      const category = decodeURIComponent(target.dataset.category);
      state.sortByCategory.set(category, target.value);
      render();
      requestAnimationFrame(() => {
        const categoryKey = encoded(category);
        const select = [...elements.categoryList.querySelectorAll('[data-action="sort-category"]')]
          .find(element => element.dataset.category === categoryKey);
        select?.focus();
      });
    });

    elements.categoryList.addEventListener('input', event => {
      const input = event.target.closest('[data-inline-multiplier-input]');
      if (input) {
        input.classList.remove('invalid');
        updateMultiplierEditorState(input.closest('[data-inline-multiplier-editor]'));
      }
    });

    elements.categoryList.addEventListener('keydown', event => {
      const input = event.target.closest('[data-inline-multiplier-input]');
      if (!input || event.key !== 'Enter') return;
      event.preventDefault();
      input.closest('[data-inline-multiplier-editor]').querySelector('[data-action="save-entry-multiplier"]').click();
    });

    function clearDragState() {
      state.draggedEntryId = null;
      elements.categoryList.classList.remove('is-dragging');
      elements.categoryList.querySelectorAll('.dragging, .drag-over').forEach(node => {
        node.classList.remove('dragging', 'drag-over');
      });
    }

    elements.categoryList.addEventListener('dragstart', event => {
      const handle = event.target.closest('[data-drag-entry]');
      if (!handle) return;
      const id = decodeURIComponent(handle.dataset.dragEntry);
      const entry = entries.find(item => item.id === id);
      if (!entry) {
        event.preventDefault();
        return;
      }

      state.draggedEntryId = id;
      elements.categoryList.classList.add('is-dragging');
      handle.closest('tr')?.classList.add('dragging');
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', id);
    });

    elements.categoryList.addEventListener('dragover', event => {
      const card = event.target.closest('.category-card');
      if (!card || !state.draggedEntryId) return;
      const entry = entries.find(item => item.id === state.draggedEntryId);
      const targetCategory = decodeURIComponent(card.dataset.category);
      if (!entry || entry.category === targetCategory) return;

      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      elements.categoryList.querySelectorAll('.drag-over').forEach(node => {
        if (node !== card) node.classList.remove('drag-over');
      });
      card.classList.add('drag-over');
    });

    elements.categoryList.addEventListener('dragleave', event => {
      const card = event.target.closest('.category-card');
      if (!card || (event.relatedTarget && card.contains(event.relatedTarget))) return;
      card.classList.remove('drag-over');
    });

    elements.categoryList.addEventListener('drop', event => {
      const card = event.target.closest('.category-card');
      if (!card) return;
      event.preventDefault();
      const id = state.draggedEntryId || event.dataTransfer.getData('text/plain');
      const targetCategory = decodeURIComponent(card.dataset.category);
      const entry = entries.find(item => item.id === id);
      clearDragState();
      if (!entry || entry.category === targetCategory) return;
      if (moveEntry(id, targetCategory)) {
        showToast(`已移动到「${targetCategory}」`);
      }
    });

    elements.categoryList.addEventListener('dragend', clearDragState);

    elements.exportButton.addEventListener('click', exportData);
    elements.importButton.addEventListener('click', () => elements.fileInput.click());
    elements.fileInput.addEventListener('change', () => {
      const [file] = elements.fileInput.files;
      if (file) importFile(file);
    });

    elements.dialogCancel.addEventListener('click', () => closeDialog(false));
    elements.closeDialogButton.addEventListener('click', () => closeDialog(false));
    elements.dialogLayer.addEventListener('click', event => {
      if (event.target === elements.dialogLayer) closeDialog(false);
    });
    elements.dialogConfirm.addEventListener('click', () => {
      if (activeDialogMode === 'input') {
        const value = elements.dialogInput.value;
        const error = activeDialogValidator ? activeDialogValidator(value) : '';
        if (error) {
          elements.dialogError.textContent = error;
          elements.dialogError.classList.add('visible');
          elements.dialogInput.focus();
          return;
        }
        closeDialog(value);
        return;
      }
      closeDialog(true);
    });

    elements.dialogInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        elements.dialogConfirm.click();
      }
    });

    document.addEventListener('keydown', event => {
      const dialogOpen = elements.dialogLayer.classList.contains('open');
      const entryModalOpen = elements.entryModalLayer.classList.contains('open');

      if (event.key === 'Escape') {
        if (dialogOpen) {
          event.preventDefault();
          closeDialog(false);
        } else if (entryModalOpen) {
          event.preventDefault();
          closeEntryModal();
        } else if (state.searchTerm) {
          event.preventDefault();
          state.searchTerm = '';
          elements.searchInput.value = '';
          render();
          elements.searchInput.focus();
        }
        return;
      }

      if (event.key === 'Tab' && dialogOpen) {
        trapFocus(event, elements.dialogLayer);
        return;
      }
      if (event.key === 'Tab' && entryModalOpen) {
        trapFocus(event, elements.entryModalLayer);
        return;
      }

      const target = event.target;
      const isEditing = target instanceof HTMLElement
        && (target.matches('input, textarea, select') || target.isContentEditable);
      if (event.key === '/' && !event.metaKey && !event.ctrlKey && !event.altKey && !isEditing) {
        event.preventDefault();
        elements.searchInput.focus();
        elements.searchInput.select();
      }
    });

    window.addEventListener('storage', event => {
      if (event.key !== STORAGE_KEY || event.newValue === null) return;
      try {
        const envelope = parseStorageValue(event.newValue);
        if (!envelope || envelope.legacy) return;
        const isNewer = envelope.revision > state.storageRevision
          || (envelope.revision === state.storageRevision
            && envelope.writerId !== state.storageWriterId);
        if (!isNewer) return;
        const editingId = elements.entryModalLayer.classList.contains('open')
          ? elements.entryId.value
          : '';
        const editingRemoved = editingId && !envelope.entries.some(entry => entry.id === editingId);
        applyStorageEnvelope(envelope);
        render();
        showToast(editingRemoved
          ? '当前编辑的记录已在另一个标签页中删除'
          : editingId
            ? '后台数据已更新，保存时会自动合并'
            : '已同步另一个标签页中的价格修改', Boolean(editingRemoved));
      } catch {
        showToast('另一个标签页写入了无法识别的数据', true);
      }
    });

    entries = loadEntries();
    render();
  </script>
</body>
</html>
