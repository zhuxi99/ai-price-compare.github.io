<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="按模型、中转站和最终倍率快速比较 AI 模型的输入、缓存与输出价格。">
  <meta name="theme-color" content="#f3f6f3">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231b5b43'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Arial' font-size='24' font-weight='700' fill='white'%3EAI%3C/text%3E%3C/svg%3E">
  <title>AI 价格比对</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #267a5b;
      --primary-strong: #1b5b43;
      --primary-soft: #e8f4ed;
      --accent: #9a6a18;
      --accent-soft: #fff7dc;
      --danger: #c7354d;
      --danger-strong: #a8243b;
      --danger-soft: #fff1f3;
      --text: #202a24;
      --text-soft: #46534b;
      --muted: #68756d;
      --border: #dce4de;
      --border-strong: #c9d5cc;
      --surface: #ffffff;
      --surface-soft: #f8faf8;
      --background: #f3f6f3;
      --shadow: 0 8px 24px rgba(27, 48, 35, .06), 0 1px 3px rgba(27, 48, 35, .04);
      --header-height: 76px;
    }

    * { box-sizing: border-box; }

    html {
      min-width: 320px;
      background: var(--background);
      scroll-behavior: smooth;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(180deg, #ffffff 0, var(--background) 360px),
        var(--background);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: 0;
    }

    button,
    input,
    select { font: inherit; }

    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; }
    [hidden] { display: none !important; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .ambient-background { display: none; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--header-height);
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      width: min(1500px, calc(100% - 40px));
      min-height: var(--header-height);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-lockup {
      min-width: 220px;
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      color: #ffffff;
      background: var(--primary-strong);
      border: 1px solid #174c38;
      border-radius: 8px;
      box-shadow: inset 0 -3px rgba(154, 106, 24, .48);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-copy { min-width: 0; display: grid; gap: 1px; }

    .brand {
      margin: 0;
      font-size: 21px;
      font-weight: 780;
      line-height: 1.2;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .record-count {
      min-height: 28px;
      display: inline-flex;
      flex: 0 0 auto;
      align-items: center;
      padding: 4px 9px;
      color: #765913;
      background: var(--accent-soft);
      border: 1px solid #eadca8;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .search-wrap {
      position: relative;
      max-width: 620px;
      margin-left: auto;
      flex: 1 1 420px;
    }

    .search-input {
      width: 100%;
      height: 44px;
      padding: 0 42px;
      color: var(--text);
      background: #ffffff;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      outline: 0;
      transition: border-color .16s, box-shadow .16s, background .16s;
    }

    .search-input::placeholder { color: #7a867e; opacity: 1; }
    .search-input:hover { border-color: #aebdb2; }
    .search-input:focus {
      background: #ffffff;
      border-color: #65a087;
      box-shadow: 0 0 0 3px rgba(38, 122, 91, .14);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 17px;
      pointer-events: none;
    }

    .clear-search {
      position: absolute;
      right: 4px;
      top: 50%;
      width: 36px;
      height: 36px;
      transform: translateY(-50%);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 50%;
      font-size: 19px;
    }

    .clear-search.visible { display: flex; }
    .clear-search:hover { color: var(--text); background: #edf2ee; }

    .toolbar-actions {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 8px;
    }

    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 13px;
      color: var(--text-soft);
      background: #ffffff;
      border: 1px solid transparent;
      border-radius: 7px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      transition: background .16s, border-color .16s, color .16s, box-shadow .16s, transform .08s;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; transform: none; }
    .btn:focus-visible,
    .category-filter-button:focus-visible,
    .category-toggle:focus-visible,
    .modal-close:focus-visible,
    .clear-search:focus-visible {
      outline: 3px solid rgba(38, 122, 91, .22);
      outline-offset: 2px;
    }

    .btn-primary {
      color: #ffffff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .btn-primary:hover { background: var(--primary-strong); border-color: var(--primary-strong); }
    .btn-secondary { background: #ffffff; border-color: var(--border-strong); }
    .btn-secondary:hover { color: var(--primary-strong); background: #f8fbf9; border-color: #aebdb2; }
    .btn-danger { color: #ffffff; background: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger-strong); border-color: var(--danger-strong); }
    .btn-ghost-danger { color: var(--danger); background: #ffffff; border-color: #efbdc6; }
    .btn-ghost-danger:hover { color: var(--danger-strong); background: var(--danger-soft); border-color: #e89eab; }
    .btn-small { min-height: 34px; padding: 6px 10px; font-size: 12px; }

    .button-icon {
      width: 16px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      font-size: 15px;
      line-height: 1;
    }

    main {
      width: min(1500px, calc(100% - 40px));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .category-filter-panel {
      position: sticky;
      top: var(--header-height);
      z-index: 80;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding: 10px 0;
      background: rgba(243, 246, 243, .96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .category-filter-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .category-filter-list {
      min-width: 0;
      display: flex;
      flex: 1 1 auto;
      gap: 7px;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
      scrollbar-width: thin;
      scrollbar-color: #c8d3ca transparent;
    }

    .category-filter-button {
      min-height: 38px;
      max-width: 310px;
      display: inline-flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      overflow: hidden;
      color: #4e5d53;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color .16s, background .16s, border-color .16s;
    }

    .category-filter-button:hover { color: var(--primary-strong); border-color: #b5c6ba; }
    .category-filter-button[aria-pressed="true"] {
      color: #174c38;
      background: var(--primary-soft);
      border-color: #9fc8b3;
      box-shadow: inset 0 -2px #79ad91;
    }

    .category-filter-button:disabled { opacity: .45; }

    .category-filter-count {
      min-width: 20px;
      min-height: 20px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      padding: 1px 5px;
      color: #765913;
      background: var(--accent-soft);
      border-radius: 999px;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .category-list { display: grid; gap: 18px; }

    .empty-state {
      padding: 72px 24px;
      color: var(--muted);
      background: #ffffff;
      border: 1px dashed #bac8bd;
      border-radius: 8px;
      text-align: center;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 18px;
    }

    .empty-action { margin-top: 16px; }

    .category-card {
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }

    .category-card:hover { border-color: #c4d1c7; }
    .category-list.is-dragging .category-card { border-style: dashed; }
    .category-card.drag-over {
      border-color: var(--primary);
      border-style: solid !important;
      box-shadow: 0 0 0 3px rgba(38, 122, 91, .14), var(--shadow);
      transform: translateY(-2px);
    }

    .category-card.drag-over .category-header { background: var(--primary-soft); }

    .category-header {
      min-height: 66px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px 10px 16px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border);
    }

    .category-card.collapsed .category-header { border-bottom: 0; }

    .category-toggle {
      min-width: 0;
      min-height: 44px;
      display: flex;
      flex: 1 1 auto;
      align-items: center;
      gap: 8px;
      padding: 5px 7px;
      color: var(--text);
      background: transparent;
      border: 0;
      border-radius: 6px;
      text-align: left;
    }

    .category-toggle:hover { color: var(--primary-strong); background: #eef4ef; }

    .chevron {
      width: 18px;
      display: inline-grid;
      flex: 0 0 auto;
      place-items: center;
      color: var(--primary);
      font-size: 13px;
    }

    .category-heading-copy {
      min-width: 0;
      display: grid;
      flex: 1 1 auto;
      gap: 1px;
    }

    .category-title {
      overflow: hidden;
      font-size: 17px;
      font-weight: 780;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-description {
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-count {
      min-width: 24px;
      min-height: 24px;
      display: inline-grid;
      flex: 0 0 auto;
      place-items: center;
      padding: 2px 7px;
      color: #765913;
      background: var(--accent-soft);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .category-actions {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 7px;
    }

    .sort-select {
      min-height: 36px;
      max-width: 190px;
      padding: 6px 30px 6px 9px;
      color: var(--text-soft);
      background: #ffffff;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      outline: 0;
      font-size: 12px;
      font-weight: 650;
    }

    .sort-select:hover { border-color: #aebdb2; }
    .sort-select:focus { border-color: #65a087; box-shadow: 0 0 0 3px rgba(38, 122, 91, .12); }

    .table-wrap {
      overflow-x: auto;
      background: #ffffff;
      scrollbar-color: #c6d0c8 transparent;
    }

    table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      padding: 10px 13px;
      color: #5e6c63;
      background: #f6f8f6;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 750;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody th,
    tbody td {
      padding: 12px 13px;
      border-bottom: 1px solid #e7ece8;
      text-align: left;
      vertical-align: middle;
    }

    tbody th { background: inherit; }
    tbody tr:nth-child(even) { background: #fbfcfb; }
    tbody tr:hover { background: #f0f6f2; }
    tbody tr:last-child > * { border-bottom: 0; }
    tbody tr.dragging { opacity: .42; background: #e3f0e8; }

    .model-cell { width: 16%; font-weight: 750; word-break: break-word; }
    .provider-cell { width: 13%; word-break: break-word; }
    .multiplier-cell { width: 20%; }
    .price-cell { width: 11%; text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .action-cell { width: 18%; white-space: nowrap; }
    thead .price-cell { text-align: right; }

    .model-content { display: flex; align-items: center; gap: 8px; }

    .drag-handle {
      width: 24px;
      height: 30px;
      display: inline-flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      color: #8b9a90;
      border-radius: 6px;
      cursor: grab;
      font-size: 17px;
      line-height: 1;
      user-select: none;
    }

    .drag-handle:hover { color: var(--primary); background: #e5f1e9; }
    .drag-handle:active { cursor: grabbing; }

    .provider-content { min-width: 0; display: grid; gap: 3px; }
    .provider-name { color: #334039; font-weight: 700; }

    .relay-address {
      display: block;
      max-width: 100%;
      overflow: hidden;
      color: #26714f;
      font-size: 11px;
      font-weight: 550;
      text-decoration: none;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .relay-address:hover { color: #174c38; text-decoration: underline; }
    .relay-address:focus-visible { outline: 2px solid rgba(38, 122, 91, .32); outline-offset: 2px; }

    .inline-multiplier-editor {
      min-width: 210px;
      display: grid;
      grid-template-columns: auto minmax(68px, 1fr) auto;
      align-items: center;
      gap: 6px;
    }

    .inline-multiplier-toggle {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      user-select: none;
    }

    .inline-multiplier-toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--primary);
    }

    .inline-multiplier-input-wrap { position: relative; }

    .inline-multiplier-prefix {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      pointer-events: none;
    }

    .inline-multiplier-input {
      width: 100%;
      height: 34px;
      padding: 5px 6px 5px 22px;
      color: var(--text);
      background: #ffffff;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      outline: 0;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .inline-multiplier-input:focus { border-color: #65a087; box-shadow: 0 0 0 3px rgba(38, 122, 91, .12); }
    .inline-multiplier-input:disabled { color: #829087; background: #eef2ef; }
    .inline-multiplier-input.invalid { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(199, 53, 77, .12); }

    .save-multiplier-button:disabled {
      color: #7f8a83;
      background: #eef2ef;
      border-color: #dbe2dc;
      opacity: 1;
    }

    .price-value { color: #263129; font-size: 14px; font-weight: 800; }
    .price-output .price-value { color: #7d5b14; }
    .multiplier-note { display: block; margin-top: 1px; color: var(--muted); font-size: 10px; font-weight: 500; }

    .price-cell.is-best { background: #edf7f0; }
    .best-price-badge {
      display: inline-block;
      margin-left: 5px;
      padding: 1px 4px;
      color: #1a6848;
      background: #d7eddf;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 800;
      vertical-align: 1px;
    }

    .row-actions { display: flex; flex-wrap: wrap; gap: 6px; }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      background: rgba(25, 35, 29, .5);
      backdrop-filter: blur(5px);
    }

    .modal-layer.open { display: flex; }
    .modal-layer.secondary { z-index: 1100; background: rgba(25, 35, 29, .35); }

    .modal {
      width: min(620px, 100%);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #e0e6e1;
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(18, 31, 23, .28);
      animation: modal-in .16s ease-out;
    }

    .modal.compact { width: min(440px, 100%); }

    @keyframes modal-in {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      min-height: 58px;
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px 12px 20px;
      background: rgba(248, 250, 248, .97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .modal-title { margin: 0; flex: 1 1 auto; font-size: 19px; font-weight: 780; }

    .modal-close {
      width: 40px;
      height: 40px;
      display: inline-grid;
      flex: 0 0 auto;
      place-items: center;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 50%;
      font-size: 21px;
    }

    .modal-close:hover { color: var(--text); background: #e9efea; }
    .modal-body { padding: 18px 20px; }

    .modal-footer {
      position: sticky;
      bottom: 0;
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      gap: 9px;
      padding: 12px 20px 16px;
      background: rgba(255, 255, 255, .97);
      border-top: 1px solid #edf0ed;
      backdrop-filter: blur(10px);
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { min-width: 0; }
    .form-group.full { grid-column: 1 / -1; }

    .form-label {
      display: block;
      margin-bottom: 6px;
      color: #3d4941;
      font-size: 13px;
      font-weight: 700;
    }

    .required { color: var(--danger); }

    .form-control {
      width: 100%;
      height: 42px;
      padding: 8px 10px;
      color: var(--text);
      background: #ffffff;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      outline: 0;
      transition: border-color .16s, box-shadow .16s, background .16s;
    }

    .form-control:hover { border-color: #aebdb2; }
    .form-control:focus { border-color: #65a087; box-shadow: 0 0 0 3px rgba(38, 122, 91, .12); }
    .form-control[aria-invalid="true"] { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(199, 53, 77, .1); }

    .category-field { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }

    .checkbox-row {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #3d4941;
      font-weight: 650;
      user-select: none;
    }

    .checkbox-row input { width: 18px; height: 18px; accent-color: var(--primary); }

    .unit-input { position: relative; }
    .unit-input .form-control { padding-right: 106px; }

    .unit {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 11px;
      pointer-events: none;
    }

    .form-error {
      display: none;
      margin: 14px 0 0;
      padding: 9px 11px;
      color: var(--danger-strong);
      background: var(--danger-soft);
      border: 1px solid #f0bcc5;
      border-radius: 7px;
      font-size: 13px;
    }

    .form-error.visible { display: block; }
    .dialog-message { margin: 0; color: var(--text-soft); white-space: pre-line; }
    .dialog-input { margin-top: 14px; }

    .toast-wrap {
      position: fixed;
      z-index: 2000;
      right: 18px;
      bottom: 18px;

    .toast {

    @media (max-width: 1120px) {
      :root { --header-height: 128px; }

    @media (max-width: 1080px) {
      .category-card {

      table,

      tbody { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; align-items: start; }

      tbody tr,
      tbody tr:nth-child(even),

        background: #ffffff;

      tbody th,

      .multiplier-cell { order: 4; padding-block: 9px; border-top: 1px solid var(--border); }

      .inline-multiplier-editor { min-width: 0; grid-template-columns: auto minmax(0, 1fr) auto; }
      .inline-multiplier-toggle { min-height: 42px; }

      .row-actions { display: grid; grid-template-columns: repeat(3, 1fr); }

    @media (max-width: 640px) {

      .category-filter-list::-webkit-scrollbar { display: none; }

      .category-header { min-height: 0; padding: 9px; gap: 7px; }

      .category-title { font-size: 16px; }
      .category-description { font-size: 10px; }

      .category-actions .sort-select { max-width: none; min-height: 42px; }
      .category-actions .btn { min-width: 42px; min-height: 42px; padding-inline: 8px; }

    @media (max-width: 390px) {

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
