<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 价格比对</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eff6ff;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --text: #172033;
      --muted: #64748b;
      --border: #dbe3ef;
      --surface: #ffffff;
      --background: #f1f5f9;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
      --header-height: 78px;
    }

    * { box-sizing: border-box; }

    html { color-scheme: light; }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--text);
      background: var(--background);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.5;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      min-height: var(--header-height);
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 3px 14px rgba(15, 23, 42, 0.06);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      width: min(1480px, calc(100% - 40px));
      min-height: var(--header-height);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand {
      flex: 0 0 auto;
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .record-count {
      display: none;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .record-count.visible { display: inline; }

    .search-wrap {
      position: relative;
      flex: 1 1 380px;
      max-width: 560px;
      margin-left: auto;
    }

    .search-input {
      width: 100%;
      height: 42px;
      padding: 0 40px 0 42px;
      color: var(--text);
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    .search-input:focus {
      background: #fff;
      border-color: #7aa6f8;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .clear-search {
      position: absolute;
      right: 8px;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translateY(-50%);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 50%;
      font-size: 18px;
    }

    .clear-search.visible { display: flex; }
    .clear-search:hover { color: var(--text); background: #e9eef6; }

    .toolbar-actions {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 8px;
    }

    .btn {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-weight: 600;
      transition: background .16s, border-color .16s, color .16s, transform .08s;
    }

    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 3px solid rgba(37, 99, 235, .2); outline-offset: 2px; }

    .btn-primary { color: #fff; background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .btn-secondary { color: #334155; background: #fff; border-color: var(--border); }
    .btn-secondary:hover { background: #f8fafc; border-color: #b9c6d8; }
    .btn-danger { color: #fff; background: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger-dark); border-color: var(--danger-dark); }
    .btn-ghost-danger { color: var(--danger); background: #fff; border-color: #fecaca; }
    .btn-ghost-danger:hover { background: #fef2f2; border-color: #fca5a5; }
    .btn-small { min-height: 32px; padding: 5px 10px; font-size: 13px; }

    main {
      width: min(1480px, calc(100% - 40px));
      margin: 0 auto;
      padding: calc(var(--header-height) + 28px) 0 48px;
    }

    .category-list { display: grid; gap: 20px; }

    .empty-state {
      padding: 80px 24px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed #c7d2e1;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .empty-state strong {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 18px;
    }

    .category-card {
      overflow: hidden;
      background: var(--surface);
      border: 1px solid rgba(219, 227, 239, .9);
      border-radius: 10px;
      box-shadow: var(--shadow);
      transition: border-color .16s, box-shadow .16s, transform .16s;
    }

    .category-list.is-dragging .category-card {
      border-style: dashed;
    }

    .category-card.drag-over {
      border-color: var(--primary);
      border-style: solid !important;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .16), var(--shadow);
      transform: translateY(-2px);
    }

    .category-card.drag-over .category-header {
      background: var(--primary-soft);
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 64px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .category-card.collapsed .category-header { border-bottom: 0; }

    .category-toggle {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px;
      color: var(--text);
      background: transparent;
      border: 0;
      text-align: left;
      border-radius: 7px;
    }

    .category-toggle:hover { color: var(--primary); background: #f8fafc; }

    .chevron {
      flex: 0 0 auto;
      width: 18px;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
    }

    .category-title {
      overflow: hidden;
      font-size: 18px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .category-count {
      flex: 0 0 auto;
      color: var(--muted);
      font-weight: 500;
    }

    .category-actions {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 8px;
    }

    .sort-select {
      min-height: 34px;
      max-width: 190px;
      padding: 5px 30px 5px 10px;
      color: #334155;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 7px;
      outline: none;
      font-size: 13px;
    }

    .sort-select:focus { border-color: #7aa6f8; box-shadow: 0 0 0 3px rgba(37, 99, 235, .1); }


    .btn:disabled {
      cursor: not-allowed;
      opacity: .48;
      transform: none;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      min-width: 1050px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 13px 16px;
      border-bottom: 1px solid #e8edf4;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: #475569;
      background: #f8fafc;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) { background: #fbfdff; }
    tbody tr:hover { background: var(--primary-soft); }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr.dragging { opacity: .42; background: #dbeafe; }

    .model-cell { width: 17%; font-weight: 650; word-break: break-word; }
    .provider-cell { width: 12%; word-break: break-word; }
    .provider-content { display: grid; gap: 4px; }
    .relay-address {
      display: block;
      overflow: hidden;
      color: var(--primary);
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .relay-address:hover { color: var(--primary-dark); text-decoration: underline; }
    .relay-address:focus-visible { outline: 2px solid rgba(37, 99, 235, .35); outline-offset: 2px; }
    .multiplier-cell { width: 18%; }
    .price-cell { width: 12%; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .action-cell { width: 17%; white-space: nowrap; }

    .model-content { display: flex; align-items: center; gap: 9px; }
    .drag-handle {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 28px;
      color: #94a3b8;
      border-radius: 6px;
      cursor: grab;
      font-size: 18px;
      line-height: 1;
      user-select: none;
    }
    .drag-handle:hover { color: var(--primary); background: #dbeafe; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:focus-visible { color: var(--primary); outline: 2px solid rgba(37, 99, 235, .35); outline-offset: 1px; }

    .inline-multiplier-editor {
      min-width: 200px;
      display: grid;
      grid-template-columns: auto minmax(64px, 1fr) auto;
      align-items: center;
      gap: 6px;
    }

    .inline-multiplier-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #475569;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      user-select: none;
    }

    .inline-multiplier-toggle input {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: var(--primary);
    }

    .inline-multiplier-input-wrap { position: relative; }

    .inline-multiplier-prefix {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
    }

    .inline-multiplier-input {
      width: 100%;
      height: 32px;
      padding: 4px 6px 4px 22px;
      color: var(--text);
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      outline: none;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .inline-multiplier-input:focus {
      border-color: #7aa6f8;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    .inline-multiplier-input:disabled {
      color: #94a3b8;
      background: #f1f5f9;
      cursor: not-allowed;
    }

    .inline-multiplier-input.invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, .1);
    }

    .price-value { color: #0f172a; font-weight: 700; }
    .multiplier-note { margin-left: 5px; color: var(--muted); font-size: 12px; font-weight: 500; }
    .row-actions { display: flex; flex-wrap: wrap; gap: 7px; }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(15, 23, 42, .54);
      overflow-y: auto;
    }

    .modal-layer.open { display: flex; }
    .modal-layer.secondary { z-index: 1100; background: rgba(15, 23, 42, .35); }

    .modal {
      width: min(620px, 100%);
      max-height: calc(100vh - 44px);
      overflow-y: auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .28);
      animation: modal-in .16s ease-out;
    }

    .modal.compact { width: min(440px, 100%); }

    @keyframes modal-in {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title { margin: 0; font-size: 20px; }
    .modal-body { padding: 20px 22px; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 22px 20px;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { min-width: 0; }
    .form-group.full { grid-column: 1 / -1; }

    .form-label {
      display: block;
      margin-bottom: 7px;
      color: #334155;
      font-size: 14px;
      font-weight: 650;
    }

    .required { color: var(--danger); }

    .form-control {
      width: 100%;
      height: 42px;
      padding: 9px 11px;
      color: var(--text);
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      transition: border-color .16s, box-shadow .16s;
    }

    .form-control:focus { border-color: #7aa6f8; box-shadow: 0 0 0 3px rgba(37, 99, 235, .11); }

    .category-field { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }

    .checkbox-row {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 9px;
      color: #334155;
      font-weight: 600;
      user-select: none;
    }

    .checkbox-row input { width: 17px; height: 17px; accent-color: var(--primary); }

    .unit-input { position: relative; }
    .unit-input .form-control { padding-right: 112px; }
    .unit {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    .form-error {
      display: none;
      margin: 16px 0 0;
      padding: 10px 12px;
      color: var(--danger-dark);
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 14px;
    }

    .form-error.visible { display: block; }

    .dialog-message { margin: 0; color: #475569; white-space: pre-line; }
    .dialog-input { margin-top: 16px; }

    .toast-wrap {
      position: fixed;
      z-index: 2000;
      right: 20px;
      bottom: 20px;
      display: grid;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      min-width: 220px;
      max-width: 380px;
      padding: 12px 15px;
      color: #fff;
      background: #0f172a;
      border-radius: 9px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .24);
      animation: toast-in .2s ease-out;
    }

    .toast.error { background: var(--danger-dark); }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1080px) {
      :root { --header-height: 128px; }
      .topbar-inner { flex-wrap: wrap; align-content: center; padding: 12px 0; gap: 10px; }
      .brand { font-size: 21px; }
      .search-wrap { order: 3; flex-basis: 100%; max-width: none; margin-left: 0; }
      .toolbar-actions { margin-left: auto; }
      .category-header { align-items: flex-start; flex-wrap: wrap; }
      .category-actions { width: 100%; padding-left: 31px; flex-wrap: wrap; }
    }

    @media (max-width: 760px) {
      :root { --header-height: 184px; }
      .topbar-inner, main { width: min(100% - 24px, 1480px); }
      .brand { width: 100%; }
      .record-count { margin-left: auto; }
      .toolbar-actions { width: 100%; margin-left: 0; }
      .toolbar-actions .btn { flex: 1; padding-inline: 8px; font-size: 13px; }
      main { padding-bottom: 28px; }
      .category-header { padding: 10px 11px; }
      .category-actions { padding-left: 0; }
      .sort-select { flex: 1 1 170px; max-width: none; }
      th, td { padding: 11px 12px; }
      table { min-width: 820px; }
      .cache-column { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: auto; }
      .modal-layer { padding: 12px; }
      .modal { max-height: calc(100vh - 24px); }
    }

    @media (max-width: 430px) {
      :root { --header-height: 224px; }
      .toolbar-actions { display: grid; grid-template-columns: 1fr 1fr; }
      .toolbar-actions .btn-primary { grid-column: 1 / -1; }
      .category-actions .btn { flex: 1; }
      .modal-header, .modal-body { padding-left: 16px; padding-right: 16px; }
      .modal-footer { padding-left: 16px; padding-right: 16px; }
    }

    /* 2026 visual refresh */
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-soft: #eef2ff;
      --accent: #0891b2;
      --accent-soft: #ecfeff;
      --danger: #e11d48;
      --danger-dark: #be123c;
      --text: #182033;
      --muted: #697386;
      --border: #dfe4ee;
      --surface: rgba(255, 255, 255, .94);
      --background: #f5f7fb;
      --shadow: 0 18px 45px rgba(38, 51, 77, .08), 0 2px 8px rgba(38, 51, 77, .04);
      --header-height: 92px;
    }

    body {
      background:
        radial-gradient(circle at 10% -10%, rgba(79, 70, 229, .12), transparent 30%),
        radial-gradient(circle at 92% 5%, rgba(8, 145, 178, .1), transparent 28%),
        linear-gradient(180deg, #f8faff 0, var(--background) 420px);
      letter-spacing: -.006em;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: .28;
      background-image: radial-gradient(rgba(79, 70, 229, .16) .6px, transparent .6px);
      background-size: 22px 22px;
      pointer-events: none;
    }

    .topbar {
      background: rgba(250, 251, 255, .84);
      border-bottom-color: rgba(207, 214, 228, .78);
      box-shadow: 0 8px 32px rgba(37, 45, 72, .07);
      backdrop-filter: blur(18px) saturate(150%);
    }

    .topbar-inner { width: min(1540px, calc(100% - 48px)); gap: 18px; }

    .brand-lockup {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 228px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 43px;
      height: 43px;
      color: #fff;
      background: linear-gradient(145deg, #6366f1, #4338ca 58%, #0891b2);
      border: 1px solid rgba(255, 255, 255, .42);
      border-radius: 14px;
      box-shadow: 0 9px 20px rgba(79, 70, 229, .26), inset 0 1px rgba(255, 255, 255, .28);
      font-size: 14px;
      font-weight: 850;
      letter-spacing: -.04em;
    }

    .brand-copy { display: grid; gap: 2px; }
    .brand { font-size: 21px; font-weight: 800; letter-spacing: -.035em; }
    .brand-subtitle { color: var(--muted); font-size: 11px; letter-spacing: .04em; }

    .record-count {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      color: #4f46e5;
      background: rgba(238, 242, 255, .9);
      border: 1px solid #dbe0ff;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .search-wrap { max-width: 620px; }
    .search-input {
      height: 46px;
      background: rgba(255, 255, 255, .88);
      border-color: #d9dfeb;
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(37, 45, 72, .035), inset 0 1px rgba(255, 255, 255, .6);
    }
    .search-input:hover { border-color: #c6cfdf; }
    .search-input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, .12), 0 8px 18px rgba(37, 45, 72, .06);
    }
    .search-icon { color: #7c86a0; font-size: 17px; }

    .toolbar-actions { gap: 9px; }
    .btn {
      min-height: 40px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -.005em;
      transition: transform .16s ease, box-shadow .16s ease, background .16s, border-color .16s, color .16s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: linear-gradient(135deg, #5b55ea, #4338ca);
      border-color: #4f46e5;
      box-shadow: 0 7px 16px rgba(79, 70, 229, .2);
    }
    .btn-primary:hover { background: linear-gradient(135deg, #4f46e5, #3730a3); box-shadow: 0 9px 20px rgba(79, 70, 229, .25); }
    .btn-secondary { color: #3c465d; background: rgba(255, 255, 255, .82); border-color: #d8deea; }
    .btn-secondary:hover { color: #3730a3; background: #fff; border-color: #bfc8dc; box-shadow: 0 6px 14px rgba(37, 45, 72, .07); }
    .btn-ghost-danger { background: rgba(255, 255, 255, .7); border-color: #fecdd3; }
    .btn-small { min-height: 33px; padding: 5px 10px; }

    main { width: min(1540px, calc(100% - 48px)); padding-top: calc(var(--header-height) + 34px); }
    .category-list { gap: 24px; }
    .category-card {
      overflow: hidden;
      border-color: rgba(215, 222, 235, .88);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .category-card:hover { border-color: #cbd3e3; box-shadow: 0 22px 52px rgba(38, 51, 77, .105), 0 3px 10px rgba(38, 51, 77, .05); }

    .category-header {
      position: relative;
      min-height: 72px;
      padding: 14px 18px 14px 22px;
      background: linear-gradient(100deg, rgba(248, 250, 255, .98), rgba(255, 255, 255, .96));
      border-bottom-color: #e5e9f1;
    }
    .category-header::before {
      content: '';
      position: absolute;
      left: 0;
      top: 18px;
      bottom: 18px;
      width: 4px;
      background: linear-gradient(#6366f1, #06b6d4);
      border-radius: 0 4px 4px 0;
    }
    .category-toggle { gap: 9px; }

        elements.categoryList.innerHTML = `
          <div class="empty-state">
            <strong>没有匹配结果</strong>
            换个模型名称或中转站关键词试试。
          </div>`;
        return;
      }

      const grouped = new Map();
      filtered.forEach(entry => {
        if (!grouped.has(entry.category)) grouped.set(entry.category, []);
        grouped.get(entry.category).push(entry);
      });

      elements.categoryList.innerHTML = [...grouped.keys()]
        .sort((a, b) => a.localeCompare(b, 'zh-CN'))
        .map(category => renderCategory(category, grouped.get(category)))
        .join('');
    }

    function renderCategory(category, categoryEntries) {
      const sortField = state.sortByCategory.get(category) || 'baseOutputPrice';
      const sortedEntries = [...categoryEntries].sort((a, b) => {
        const difference = actualPrice(b, sortField) - actualPrice(a, sortField);
        return difference || a.modelName.localeCompare(b.modelName, 'zh-CN');
      });
      const collapsed = state.collapsedCategories.has(category);
      const categoryKey = encoded(category);

      return `
        <article class="category-card${collapsed ? ' collapsed' : ''}" data-category="${categoryKey}">
          <header class="category-header">
            <button class="category-toggle" type="button" data-action="toggle-category" data-category="${categoryKey}" aria-expanded="${!collapsed}">
              <span class="chevron" aria-hidden="true">${collapsed ? '▶' : '▼'}</span>
              <span class="category-title">${escapeHtml(category)}</span>
              <span class="category-count">（${categoryEntries.length}）</span>
            </button>
            <div class="category-actions">
              <select class="sort-select" data-action="sort-category" data-category="${categoryKey}" aria-label="${escapeHtml(category)}排序方式">
                <option value="baseOutputPrice"${sortField === 'baseOutputPrice' ? ' selected' : ''}>按输出价格↓</option>
                <option value="baseInputPrice"${sortField === 'baseInputPrice' ? ' selected' : ''}>按输入价格↓</option>
                <option value="baseCacheInputPrice"${sortField === 'baseCacheInputPrice' ? ' selected' : ''}>按缓存输入价格↓</option>
              </select>
              <button class="btn btn-secondary btn-small" type="button" data-action="edit-category" data-category="${categoryKey}">编辑分类</button>
              <button class="btn btn-ghost-danger btn-small" type="button" data-action="delete-category" data-category="${categoryKey}">删除分类</button>
            </div>
          </header>
          ${collapsed ? '' : renderTable(sortedEntries)}
        </article>`;
    }

    function renderTable(categoryEntries) {
      const rows = categoryEntries.map(entry => {
        const entryId = encoded(entry.id);
        return `
          <tr data-entry-id="${entryId}">
            <td class="model-cell" data-label="模型名称">
              <div class="model-content">
                <span class="drag-handle" draggable="true" data-drag-entry="${entryId}" title="拖动到其他分类" aria-hidden="true">⠿</span>
                <span>${escapeHtml(entry.modelName)}</span>
              </div>
            </td>
            <td class="provider-cell" data-label="中转站">
              <div class="provider-content">
                <span>${escapeHtml(entry.provider)}</span>
                ${relayAddressMarkup(entry)}
              </div>
            </td>
            <td class="multiplier-cell" data-label="倍率">
              <div class="inline-multiplier-editor" data-inline-multiplier-editor data-id="${entryId}">
                <label class="inline-multiplier-toggle" title="是否对本条记录启用倍率">
                  <input type="checkbox" data-inline-multiplier-enabled${entry.useMultiplier ? ' checked' : ''}>
                  <span>启用</span>
                </label>
                <div class="inline-multiplier-input-wrap">
                  <span class="inline-multiplier-prefix">×</span>
                  <input class="inline-multiplier-input" data-inline-multiplier-input type="number" min="0" step="any" inputmode="decimal" value="${entry.useMultiplier ? escapeHtml(entry.multiplier) : ''}" placeholder="倍率" aria-label="${escapeHtml(entry.modelName)}倍率"${entry.useMultiplier ? '' : ' disabled'}>
                </div>
                <button class="btn btn-primary btn-small" type="button" data-action="save-entry-multiplier" data-id="${entryId}">保存</button>
              </div>
            </td>
            <td class="price-cell price-input" data-label="输入价">${priceMarkup(entry, 'baseInputPrice')}</td>
            <td class="price-cell price-cache cache-column" data-label="缓存价">${priceMarkup(entry, 'baseCacheInputPrice')}</td>
            <td class="price-cell price-output" data-label="输出价">${priceMarkup(entry, 'baseOutputPrice')}</td>
            <td class="action-cell" data-label="操作">
              <div class="row-actions">
                <button class="btn btn-secondary btn-small" type="button" data-action="copy-entry" data-id="${entryId}">拷贝</button>
                <button class="btn btn-secondary btn-small" type="button" data-action="edit-entry" data-id="${entryId}">编辑</button>
                <button class="btn btn-ghost-danger btn-small" type="button" data-action="delete-entry" data-id="${entryId}">删除</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="model-cell">模型名称</th>
                <th class="provider-cell">中转站</th>
                <th class="multiplier-cell">倍率（可直接修改）</th>
                <th class="price-cell">输入价（元/1M tokens）</th>
                <th class="price-cell cache-column">缓存输入价（元/1M tokens）</th>
                <th class="price-cell">输出价（元/1M tokens）</th>
                <th class="action-cell">操作</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function openEntryModal(entry = null, mode = entry ? 'edit' : 'add') {
      elements.entryForm.reset();
      clearEntryError();
      state.entryModalMode = mode;
      state.modalCategories = getCategories();

      if (entry && !state.modalCategories.includes(entry.category)) {
        state.modalCategories.push(entry.category);
        state.modalCategories.sort((a, b) => a.localeCompare(b, 'zh-CN'));
      }

      elements.entryModalTitle.textContent = mode === 'copy' ? '拷贝条目' : entry ? '编辑条目' : '添加条目';
      elements.entryId.value = mode === 'edit' && entry ? entry.id : '';
      populateCategorySelect(entry ? entry.category : state.modalCategories[0] || '');

      if (entry) {
        elements.modelName.value = entry.modelName;
        elements.provider.value = entry.provider;
        elements.relayAddress.value = entry.relayAddress || '';
        elements.useMultiplier.checked = entry.useMultiplier;
        elements.multiplier.value = entry.useMultiplier ? entry.multiplier : '';
        elements.baseInputPrice.value = entry.baseInputPrice;
        elements.baseCacheInputPrice.value = entry.baseCacheInputPrice;
        elements.baseOutputPrice.value = entry.baseOutputPrice;
      }

      updateMultiplierUI();
      elements.entryModalLayer.classList.add('open');
      elements.entryModalLayer.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      setTimeout(() => elements.modelName.focus(), 0);
    }

    function closeEntryModal() {
      elements.entryModalLayer.classList.remove('open');
      elements.entryModalLayer.setAttribute('aria-hidden', 'true');
      if (!elements.dialogLayer.classList.contains('open')) document.body.style.overflow = '';
      clearEntryError();
      state.entryModalMode = 'add';
    }

    function populateCategorySelect(selectedCategory = '') {
      if (state.modalCategories.length === 0) {
        elements.categorySelect.innerHTML = '<option value="">请先新建分类</option>';
        elements.categorySelect.value = '';
        return;
      }

      elements.categorySelect.innerHTML = state.modalCategories
        .map(category => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`)
        .join('');
      elements.categorySelect.value = state.modalCategories.includes(selectedCategory)
        ? selectedCategory
        : state.modalCategories[0];
    }

    function updateMultiplierUI() {
      const enabled = elements.useMultiplier.checked;
      elements.multiplierGroup.hidden = !enabled;
      elements.inputPriceLabel.innerHTML = `${enabled ? '基础输入价格' : '输入价格'} <span class="required">*</span>`;
      elements.cachePriceLabel.innerHTML = `${enabled ? '基础缓存输入价格' : '缓存输入价格'} <span class="required">*</span>`;
      elements.outputPriceLabel.innerHTML = `${enabled ? '基础输出价格' : '输出价格'} <span class="required">*</span>`;
      if (!enabled) elements.multiplier.value = '';
    }

    function setEntryError(message) {
      elements.entryError.textContent = message;
      elements.entryError.classList.add('visible');
    }

    function clearEntryError() {
      elements.entryError.textContent = '';
      elements.entryError.classList.remove('visible');
    }

    function readEntryForm() {
      clearEntryError();
      const modelName = elements.modelName.value.trim();
      const category = elements.categorySelect.value.trim();
      const provider = elements.provider.value.trim();
      const relayAddress = elements.relayAddress.value.trim();
      const useMultiplier = elements.useMultiplier.checked;
      const rawMultiplier = elements.multiplier.value.trim();
      const rawInput = elements.baseInputPrice.value.trim();
      const rawCache = elements.baseCacheInputPrice.value.trim();
      const rawOutput = elements.baseOutputPrice.value.trim();

      if (!modelName || !category || !provider || !rawInput || !rawCache || !rawOutput || (useMultiplier && !rawMultiplier)) {
        setEntryError('请填写所有价格字段');
        return null;
      }
      if (!isValidRelayAddress(relayAddress)) {
        setEntryError('中转站网站地址必须是有效的 HTTP 或 HTTPS 地址');
        return null;
      }

      const multiplier = useMultiplier ? parseFloat(rawMultiplier) : null;
      const baseInputPrice = parseFloat(rawInput);
      const baseCacheInputPrice = parseFloat(rawCache);
      const baseOutputPrice = parseFloat(rawOutput);
      const numericValues = [baseInputPrice, baseCacheInputPrice, baseOutputPrice];
      if (useMultiplier) numericValues.push(multiplier);

      if (numericValues.some(value => !Number.isFinite(value))) {
        setEntryError('价格和倍率必须填写有效数字');
        return null;
      }
      if (baseInputPrice < 0 || baseCacheInputPrice < 0 || baseOutputPrice < 0) {
        setEntryError('价格不能小于 0');
        return null;
      }
      if (useMultiplier && multiplier <= 0) {
        setEntryError('倍率必须大于 0');
        return null;
      }

      return {
        modelName,
        category,
        provider,
        relayAddress,
        useMultiplier,
        multiplier,
        baseInputPrice,
        baseCacheInputPrice,
        baseOutputPrice
      };
    }

    function isValidEntry(entry) {
      if (!entry || typeof entry !== 'object' || Array.isArray(entry)) return false;
      if (!REQUIRED_ENTRY_KEYS.every(key => Object.prototype.hasOwnProperty.call(entry, key))) return false;
      if (typeof entry.id !== 'string' || entry.id.trim() === '') return false;
      if (typeof entry.modelName !== 'string' || entry.modelName.trim() === '') return false;
      if (typeof entry.category !== 'string' || entry.category.trim() === '') return false;
      if (typeof entry.provider !== 'string' || entry.provider.trim() === '') return false;
      if (!isValidRelayAddress(entry.relayAddress)) return false;
      if (typeof entry.useMultiplier !== 'boolean') return false;
      if (entry.useMultiplier) {
        if (typeof entry.multiplier !== 'number' || !Number.isFinite(entry.multiplier) || entry.multiplier <= 0) return false;
      } else if (entry.multiplier !== null) {
        return false;
      }
      if (![entry.baseInputPrice, entry.baseCacheInputPrice, entry.baseOutputPrice]
        .every(value => typeof value === 'number' && Number.isFinite(value) && value >= 0)) return false;
      if (typeof entry.createdAt !== 'number' || !Number.isFinite(entry.createdAt)) return false;
      if (typeof entry.updatedAt !== 'number' || !Number.isFinite(entry.updatedAt)) return false;
      return true;
    }

    function isValidImport(data) {
      if (!data || typeof data !== 'object' || Array.isArray(data)) return false;
      if (![1, 2].includes(data.version) || typeof data.exportedAt !== 'string' || Number.isNaN(Date.parse(data.exportedAt))) return false;
      if (!Array.isArray(data.entries) || !data.entries.every(isValidEntry)) return false;
      const ids = data.entries.map(entry => entry.id);
      return new Set(ids).size === ids.length;
    }

    function exportData() {
      const payload = {
        exportedAt: new Date().toISOString(),
        version: 2,
        entries
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const date = new Date();
      const localDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      link.href = url;
      link.download = `ai-price-data-${localDate}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast(`已导出 ${entries.length} 条记录`);
    }

    async function importFile(file) {
      try {
        const content = await file.text();
        const data = JSON.parse(content);
        if (!isValidImport(data)) throw new Error('invalid format');

        const confirmed = await showConfirm({
          title: '确认导入',
          message: `导入将覆盖当前全部 ${entries.length} 条数据，确认继续？`,
          confirmText: '确认导入',
          danger: true
        });
        if (!confirmed) return;

        entries = data.entries.map(entry => ({ ...entry }));
        state.sortByCategory.clear();
        state.collapsedCategories.clear();
        persistAndRender();
        showToast(`导入成功，共 ${entries.length} 条记录`);
      } catch (error) {
        showAlert('导入失败', '文件格式不符，请选择正确的导出文件');
      } finally {
        elements.fileInput.value = '';
      }
    }

    let activeDialogResolver = null;
    let activeDialogMode = 'confirm';
    let activeDialogValidator = null;

    function openDialog(options) {
      if (activeDialogResolver) activeDialogResolver(false);
      activeDialogMode = options.mode || 'confirm';
      activeDialogValidator = options.validator || null;
      elements.dialogTitle.textContent = options.title || '确认操作';
      elements.dialogMessage.textContent = options.message || '';
      elements.dialogConfirm.textContent = options.confirmText || '确定';
      elements.dialogCancel.textContent = options.cancelText || '取消';
      elements.dialogCancel.hidden = activeDialogMode === 'alert';
      elements.dialogConfirm.className = `btn ${options.danger ? 'btn-danger' : 'btn-primary'}`;
      elements.dialogInput.hidden = activeDialogMode !== 'input';
      elements.dialogInput.value = options.defaultValue || '';
      elements.dialogInput.placeholder = options.placeholder || '';
      elements.dialogError.textContent = '';
      elements.dialogError.classList.remove('visible');
      elements.dialogLayer.classList.add('open');
      elements.dialogLayer.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';

      return new Promise(resolve => {
        activeDialogResolver = resolve;
        setTimeout(() => {
          if (activeDialogMode === 'input') {
            elements.dialogInput.focus();
            elements.dialogInput.select();
          } else {
            elements.dialogConfirm.focus();
          }
        }, 0);
      });
    }

    function closeDialog(result) {
      const resolver = activeDialogResolver;
      activeDialogResolver = null;
      activeDialogValidator = null;
      elements.dialogLayer.classList.remove('open');
      elements.dialogLayer.setAttribute('aria-hidden', 'true');
      if (!elements.entryModalLayer.classList.contains('open')) document.body.style.overflow = '';
      if (resolver) resolver(result);
    }

    function showConfirm(options) {
      return openDialog({ ...options, mode: 'confirm' });
    }

    function showAlert(title, message) {
      return openDialog({ title, message, mode: 'alert', confirmText: '知道了' });
    }

    function showInput(options) {
      return openDialog({ ...options, mode: 'input' });
    }

    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast${isError ? ' error' : ''}`;
      toast.textContent = message;
      elements.toastWrap.appendChild(toast);
      setTimeout(() => toast.remove(), 2800);
    }

    elements.searchInput.addEventListener('input', event => {
      state.searchTerm = event.target.value;
      render();
    });

    elements.clearSearch.addEventListener('click', () => {
      state.searchTerm = '';
      elements.searchInput.value = '';
      elements.searchInput.focus();
      render();
    });

    elements.addButton.addEventListener('click', () => openEntryModal());
    elements.cancelEntryButton.addEventListener('click', closeEntryModal);
    elements.useMultiplier.addEventListener('change', updateMultiplierUI);

    elements.newCategoryButton.addEventListener('click', async () => {
      const category = await showInput({
        title: '新建分类',
        message: '输入新的分类名称：',
        placeholder: '如 GPT-4o 系列',
        confirmText: '创建',
        validator(value) {
          const trimmed = value.trim();
          if (!trimmed) return '分类名称不能为空';
          if (state.modalCategories.includes(trimmed)) return '该分类已存在';
          return '';
        }
      });
      if (typeof category !== 'string') return;
      const trimmed = category.trim();
      state.modalCategories.push(trimmed);
      state.modalCategories.sort((a, b) => a.localeCompare(b, 'zh-CN'));
      populateCategorySelect(trimmed);
    });

    elements.entryForm.addEventListener('submit', event => {
      event.preventDefault();
      const data = readEntryForm();
      if (!data) return;

      const id = elements.entryId.value;
      if (id) {
        if (updateEntry(id, data)) showToast('条目已更新');
      } else {
        createEntry(data);
        showToast(state.entryModalMode === 'copy' ? '条目副本已添加' : '条目已添加');
      }
      closeEntryModal();
    });

    elements.categoryList.addEventListener('click', async event => {
      const target = event.target.closest('[data-action]');
      if (!target || target.tagName === 'SELECT') return;
      const action = target.dataset.action;

      if (action === 'toggle-category') {
        const category = decodeURIComponent(target.dataset.category);
        if (state.collapsedCategories.has(category)) state.collapsedCategories.delete(category);
        else state.collapsedCategories.add(category);
        render();
        return;
      }


      if (action === 'save-entry-multiplier') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        const editor = target.closest('[data-inline-multiplier-editor]');
        if (!entry || !editor) return;

        const enabled = editor.querySelector('[data-inline-multiplier-enabled]').checked;
        const input = editor.querySelector('[data-inline-multiplier-input]');
        input.classList.remove('invalid');
        let multiplier = null;
        if (enabled) {
          const rawValue = input.value.trim();
          multiplier = parseFloat(rawValue);
          if (!rawValue || !Number.isFinite(multiplier) || multiplier <= 0) {
            input.classList.add('invalid');
            input.focus();
            showToast('请输入大于 0 的有效倍率', true);
            return;
          }
        }

        if (updateEntryMultiplier(id, enabled, multiplier)) {
          showToast(enabled
            ? `已将「${entry.modelName}」倍率改为 ×${formatMultiplier(multiplier)}`
            : `已关闭「${entry.modelName}」的倍率`);
        }
        return;
      }

      if (action === 'copy-entry') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        if (entry) openEntryModal(entry, 'copy');
        return;
      }

      if (action === 'edit-entry') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        if (entry) openEntryModal(entry, 'edit');
        return;
      }

      if (action === 'delete-entry') {
        const id = decodeURIComponent(target.dataset.id);
        const entry = entries.find(item => item.id === id);
        if (!entry) return;
        const confirmed = await showConfirm({
          title: '删除记录',
          message: `确定删除「${entry.modelName} / ${entry.provider}」这条记录？`,
          confirmText: '删除',
          danger: true
        });
        if (confirmed && deleteEntry(id)) showToast('记录已删除');
        return;
      }

      if (action === 'edit-category') {
        const category = decodeURIComponent(target.dataset.category);
        const newName = await showInput({
          title: '编辑分类',
          message: '修改分类名称。若名称与现有分类相同，两者会合并。',
          defaultValue: category,
          confirmText: '保存',
          validator(value) {
            return value.trim() ? '' : '分类名称不能为空';
          }
        });
        if (typeof newName !== 'string') return;
        const trimmed = newName.trim();
        if (trimmed !== category && renameCategory(category, trimmed)) showToast('分类名称已更新');
        return;
      }

      if (action === 'delete-category') {
        const category = decodeURIComponent(target.dataset.category);
        const count = entries.filter(entry => entry.category === category).length;
        const confirmed = await showConfirm({
          title: '删除分类',
          message: `确定删除「${category}」分类？\n${count} 个条目将被一并删除。`,
          confirmText: '删除分类',
          danger: true
        });
        if (confirmed && deleteCategory(category)) showToast(`分类及 ${count} 个条目已删除`);
      }
    });


    elements.categoryList.addEventListener('change', event => {
      const multiplierToggle = event.target.closest('[data-inline-multiplier-enabled]');
      if (multiplierToggle) {
        const editor = multiplierToggle.closest('[data-inline-multiplier-editor]');
        const input = editor.querySelector('[data-inline-multiplier-input]');
        input.disabled = !multiplierToggle.checked;
        input.classList.remove('invalid');
        if (multiplierToggle.checked) {
          if (!input.value.trim()) input.value = '1';
          input.focus();
          input.select();
        }
        return;
      }

      const target = event.target.closest('[data-action="sort-category"]');
      if (!target) return;
      const category = decodeURIComponent(target.dataset.category);
      state.sortByCategory.set(category, target.value);
      render();
    });

    elements.categoryList.addEventListener('input', event => {
      const input = event.target.closest('[data-inline-multiplier-input]');
      if (input) input.classList.remove('invalid');
    });

    elements.categoryList.addEventListener('keydown', event => {
      const input = event.target.closest('[data-inline-multiplier-input]');
      if (!input || event.key !== 'Enter') return;
      event.preventDefault();
      input.closest('[data-inline-multiplier-editor]').querySelector('[data-action="save-entry-multiplier"]').click();
    });

    function clearDragState() {
      state.draggedEntryId = null;
      elements.categoryList.classList.remove('is-dragging');
      elements.categoryList.querySelectorAll('.dragging, .drag-over').forEach(node => {
        node.classList.remove('dragging', 'drag-over');
      });
    }

    elements.categoryList.addEventListener('dragstart', event => {
      const handle = event.target.closest('[data-drag-entry]');
      if (!handle) return;
      const id = decodeURIComponent(handle.dataset.dragEntry);
      const entry = entries.find(item => item.id === id);
      if (!entry) {
        event.preventDefault();
        return;
      }

      state.draggedEntryId = id;
      elements.categoryList.classList.add('is-dragging');
      handle.closest('tr')?.classList.add('dragging');
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', id);
    });

    elements.categoryList.addEventListener('dragover', event => {
      const card = event.target.closest('.category-card');
      if (!card || !state.draggedEntryId) return;
      const entry = entries.find(item => item.id === state.draggedEntryId);
      const targetCategory = decodeURIComponent(card.dataset.category);
      if (!entry || entry.category === targetCategory) return;

      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      elements.categoryList.querySelectorAll('.drag-over').forEach(node => {
        if (node !== card) node.classList.remove('drag-over');
      });
      card.classList.add('drag-over');
    });

    elements.categoryList.addEventListener('dragleave', event => {
      const card = event.target.closest('.category-card');
      if (!card || (event.relatedTarget && card.contains(event.relatedTarget))) return;
      card.classList.remove('drag-over');
    });

    elements.categoryList.addEventListener('drop', event => {
      const card = event.target.closest('.category-card');
      if (!card) return;
      event.preventDefault();
      const id = state.draggedEntryId || event.dataTransfer.getData('text/plain');
      const targetCategory = decodeURIComponent(card.dataset.category);
      const entry = entries.find(item => item.id === id);
      clearDragState();
      if (!entry || entry.category === targetCategory) return;
      if (moveEntry(id, targetCategory)) {
        showToast(`已移动到「${targetCategory}」`);
      }
    });

    elements.categoryList.addEventListener('dragend', clearDragState);

    elements.exportButton.addEventListener('click', exportData);
    elements.importButton.addEventListener('click', () => elements.fileInput.click());
    elements.fileInput.addEventListener('change', () => {
      const [file] = elements.fileInput.files;
      if (file) importFile(file);
    });

    elements.dialogCancel.addEventListener('click', () => closeDialog(false));
    elements.dialogConfirm.addEventListener('click', () => {
      if (activeDialogMode === 'input') {
        const value = elements.dialogInput.value;
        const error = activeDialogValidator ? activeDialogValidator(value) : '';
        if (error) {
          elements.dialogError.textContent = error;
          elements.dialogError.classList.add('visible');
          elements.dialogInput.focus();
          return;
        }
        closeDialog(value);
        return;
      }
      closeDialog(true);
    });

    elements.dialogInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        elements.dialogConfirm.click();
      }
    });

    entries = loadEntries();
    render();
  </script>
</body>
</html>
